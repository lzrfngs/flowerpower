<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flower Power</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<style>
* { margin: 0; padding: 0; }
body { background: #D4CCB8; width: 100vw; height: 100vh; overflow: hidden; }
canvas { position: fixed; top: 0; left: 0; }
</style>
</head>
<body>
<script>
// ─────────────────────────────────────────────────────────
// Flower Power — Reference Recreation
// Single-pass GLSL: polar cos(Nθ) split into orange/blue,
// softness from smoothstep width, multiply for dark overlaps,
// center glow, plum fringe. No shape buffer, no post-process.
// ─────────────────────────────────────────────────────────

var vertSrc = `
attribute vec3 aPosition;
attribute vec2 aTexCoord;
uniform mat4 uModelViewMatrix;
uniform mat4 uProjectionMatrix;
varying vec2 vUv;
void main() {
  vUv = aTexCoord;
  gl_Position = uProjectionMatrix * uModelViewMatrix * vec4(aPosition, 1.0);
}
`;

var fragSrc = `
precision highp float;
varying vec2 vUv;
uniform vec2 uRes;

void main() {
  // Centered, aspect-corrected coordinates
  vec2 uv = (vUv - 0.5) * vec2(uRes.x / uRes.y, 1.0);
  float r = length(uv);
  float theta = atan(uv.y, uv.x);

  // ── Parameters (tuned to match ref) ──
  float N      = 10.0;   // petals per layer
  float power  = 0.45;   // very sub-linear = fat rounded blobs
  float blur   = 0.07;   // smoothstep transition width
  float R_min  = 0.18;   // wider inner disc = fatter petal bases
  float R_maxA = 0.36;   // orange petal reach
  float R_maxB = 0.32;   // blue petal reach

  // ── Colors (sampled from ref) ──
  vec3 cream   = vec3(0.831, 0.800, 0.722);  // #D4CCB8
  vec3 orange  = vec3(0.980, 0.482, 0.008);  // #FA7B02
  vec3 blue    = vec3(0.616, 0.706, 0.820);  // #9DB4D1
  vec3 yellow  = vec3(0.93, 0.84, 0.38);     // center glow
  vec3 plum    = vec3(0.643, 0.490, 0.588);  // #A47D96 outer fringe

  // ── Petal shapes ──
  // cos(Nθ) creates N peaks. Split positive = orange, negative = blue.
  // pow(x, 0.7) fattens the peaks into rounded blobs.
  float wave   = cos(N * theta);
  float petalA = pow(max( wave, 0.0), power);  // orange lobes
  float petalB = pow(max(-wave, 0.0), power);  // blue lobes

  // Radial boundary modulated by petal shape
  float boundA = R_min + (R_maxA - R_min) * petalA;
  float boundB = R_min + (R_maxB - R_min) * petalB;

  // Smooth masks — the blur width IS the watercolor softness
  float maskA  = smoothstep(boundA + blur, boundA - blur, r);
  float maskB  = smoothstep(boundB + blur, boundB - blur, r);

  // ── Outer plum fringe ──
  float fringe = smoothstep(0.44, 0.32, r) * 0.22;

  // ── Center glow ──
  float glow   = smoothstep(0.22, 0.0, r);

  // ── Composite (back to front) ──
  vec3 color = cream;

  // 1. Plum fringe halo (very faint, behind everything)
  color = mix(color, plum, fringe);

  // 2. Blue flower layer
  color = mix(color, blue, maskB * 0.80);

  // 3. Orange flower layer
  color = mix(color, orange, maskA * 0.88);

  // 4. Multiply-darken at overlaps (orange × blue = dark olive)
  float overlap = maskA * maskB;
  vec3 bleed = orange * blue;  // ≈ dark olive/amber
  color = mix(color, bleed, overlap * 0.85);

  // 5. Center glow (warm yellow, on top)
  color = mix(color, yellow, glow * 0.65);

  gl_FragColor = vec4(color, 1.0);
}
`;

var sh;

function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);
  pixelDensity(1);
  sh = createShader(vertSrc, fragSrc);
  noLoop();
  redraw();
}

function draw() {
  shader(sh);
  sh.setUniform('uRes', [width, height]);
  noStroke();
  plane(width, height);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  redraw();
}
</script>
</body>
</html>
