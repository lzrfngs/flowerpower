<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flower Power</title>
<!--
  Rendering: p5.js â€” bezier petal shapes, layered watercolor technique
  Perlin noise for organic animation. No sequential PRNG.
  IBM Plex Mono via Google Fonts.
-->
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream:  #EAE4D8;
  --panel:  #DDD7CB;
  --border: #BFB8A8;
  --text:   #4A4030;
  --dim:    #8A8070;
  --accent: #3A3020;
  --track:  #C8C0B0;
}

body {
  background: var(--cream);
  font-family: 'IBM Plex Mono', monospace;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  color: var(--text);
}

/* â”€â”€ Registration marks â”€â”€ */
#reg-marks {
  position: fixed;
  inset: 0;
  z-index: 5;
  pointer-events: none;
}
#reg-marks span {
  position: absolute;
  width: 14px;
  height: 14px;
  border: 1px solid #9A8F80;
  opacity: 0.28;
  display: block;
}
#reg-marks span:nth-child(1) { top:14px;    left:14px;   border-right:0; border-bottom:0; }
#reg-marks span:nth-child(2) { top:14px;    right:14px;  border-left:0;  border-bottom:0; }
#reg-marks span:nth-child(3) { bottom:14px; left:14px;   border-right:0; border-top:0; }
#reg-marks span:nth-child(4) { bottom:14px; right:14px;  border-left:0;  border-top:0; }

/* â”€â”€ Spine label â”€â”€ */
#spine {
  position: fixed;
  left: 14px;
  top: 50%;
  transform: translateY(-50%) rotate(180deg);
  writing-mode: vertical-rl;
  font-size: 7px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--dim);
  opacity: 0.45;
  z-index: 5;
  pointer-events: none;
}

/* â”€â”€ Bottom panel â”€â”€ */
#panel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 20;
  background: var(--panel);
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 12px 28px 14px;
  gap: 10px;
}

/* State selector row */
#state-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

#state-tabs {
  display: flex;
  gap: 6px;
}

.state-tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  padding: 4px;
  border: 1px solid transparent;
  user-select: none;
  transition: border-color 0.12s;
}
.state-tab:hover       { border-color: var(--dim); }
.state-tab.active      { border-color: var(--accent); }

.thumb {
  display: block;
  width: 64px;
  height: 64px;
}

.tab-label {
  font-size: 7px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--dim);
}
.state-tab.active .tab-label { color: var(--accent); }

/* Play / pause */
#btn-play {
  width: 34px;
  height: 34px;
  background: var(--accent);
  color: var(--cream);
  border: none;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-family: inherit;
  transition: opacity 0.12s;
  margin-left: auto;
}
#btn-play:hover { opacity: 0.75; }

/* Status */
#status {
  font-size: 7px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--dim);
  opacity: 0.5;
  min-width: 60px;
  text-align: right;
}

/* Divider */
.rule {
  height: 1px;
  background: var(--border);
  opacity: 0.6;
}

/* Control rows */
.ctrl-row {
  display: flex;
  gap: 20px;
  align-items: flex-end;
}

.ctrl-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
  flex: 1;
}

.ctrl-label {
  font-size: 7px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--dim);
}

.ctrl-with-val {
  display: flex;
  align-items: center;
  gap: 7px;
}

.ctrl-val {
  font-size: 8px;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  min-width: 34px;
  text-align: right;
  flex-shrink: 0;
}

/* â”€â”€ Custom sliders â”€â”€ */
input[type=range] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 2px;
  background: linear-gradient(to right,
    var(--accent) 0%, var(--accent) var(--fill, 0%),
    var(--track)  var(--fill, 0%), var(--track) 100%);
  outline: none;
  cursor: pointer;
  border-radius: 0;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 2px;
  height: 11px;
  background: var(--accent);
  border-radius: 0;
  cursor: pointer;
}
input[type=range]::-moz-range-thumb {
  width: 2px;
  height: 11px;
  background: var(--accent);
  border-radius: 0;
  cursor: pointer;
  border: none;
}

/* â”€â”€ Palette swatches â”€â”€ */
#swatches {
  display: flex;
  gap: 5px;
  align-items: center;
}

.swatch-btn {
  display: flex;
  gap: 2px;
  padding: 4px 6px;
  cursor: pointer;
  border: 1px solid transparent;
  background: none;
  transition: border-color 0.1s;
  border-radius: 0;
  font-family: inherit;
}
.swatch-btn:hover  { border-color: var(--dim); }
.swatch-btn.active { border-color: var(--accent); }

.swatch-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  display: block;
  flex-shrink: 0;
}

/* Per-state + global label */
.section-label {
  font-size: 6px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--dim);
  opacity: 0.5;
  align-self: flex-end;
  padding-bottom: 2px;
}
</style>
</head>
<body>

<!-- p5.js creates its own canvas â€” no static canvas element needed -->

<div id="reg-marks"><span></span><span></span><span></span><span></span></div>
<div id="spine">watercolor &middot; radial &middot; loop</div>

<div id="panel">

  <!-- Row 1: State tabs + play -->
  <div id="state-row">
    <div id="state-tabs">
      <div class="state-tab active" data-idx="0">
        <canvas class="thumb" width="128" height="128"></canvas>
        <span class="tab-label">A</span>
      </div>
      <div class="state-tab" data-idx="1">
        <canvas class="thumb" width="128" height="128"></canvas>
        <span class="tab-label">B</span>
      </div>
      <div class="state-tab" data-idx="2">
        <canvas class="thumb" width="128" height="128"></canvas>
        <span class="tab-label">C</span>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;margin-left:auto">
      <button id="btn-play">&#9646;&#9646;</button>
      <span id="status">settled Â· A</span>
    </div>
  </div>

  <div class="rule"></div>

  <!-- Row 2: Per-state sliders + palette -->
  <div style="display:flex;flex-direction:column;gap:8px">
    <div class="ctrl-row">
      <span class="section-label">State</span>
      <div class="ctrl-group">
        <span class="ctrl-label">Petals</span>
        <div class="ctrl-with-val">
          <input type="range" id="s-count" min="5" max="13" step="1" value="7">
          <span class="ctrl-val" id="v-count">7</span>
        </div>
      </div>
      <div class="ctrl-group">
        <span class="ctrl-label">Reach</span>
        <div class="ctrl-with-val">
          <input type="range" id="s-reach" min="0.30" max="0.85" step="0.01" value="0.65">
          <span class="ctrl-val" id="v-reach">0.65</span>
        </div>
      </div>
      <div class="ctrl-group">
        <span class="ctrl-label">Spread</span>
        <div class="ctrl-with-val">
          <input type="range" id="s-spread" min="0" max="1" step="0.01" value="0.45">
          <span class="ctrl-val" id="v-spread">0.45</span>
        </div>
      </div>
      <div class="ctrl-group">
        <span class="ctrl-label">Twist</span>
        <div class="ctrl-with-val">
          <input type="range" id="s-twist" min="0" max="359" step="1" value="0">
          <span class="ctrl-val" id="v-twist">0&deg;</span>
        </div>
      </div>
    </div>
    <div id="swatches"></div>
  </div>

  <!-- Global controls commented out until basics are solid
  <div class="rule"></div>
  <div class="ctrl-row">
    <span class="section-label">Global</span>
    <div class="ctrl-group">
      <span class="ctrl-label">Blur</span>
      <div class="ctrl-with-val">
        <input type="range" id="g-blur" min="0.01" max="0.14" step="0.005" value="0.06">
        <span class="ctrl-val" id="v-blur">0.060</span>
      </div>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Tempo</span>
      <div class="ctrl-with-val">
        <input type="range" id="g-tempo" min="0.25" max="3" step="0.05" value="1">
        <span class="ctrl-val" id="v-tempo">1.00&times;</span>
      </div>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Pulse</span>
      <div class="ctrl-with-val">
        <input type="range" id="g-pulse" min="0" max="1" step="0.01" value="0.50">
        <span class="ctrl-val" id="v-pulse">0.50</span>
      </div>
    </div>
  </div>
  -->

</div>

<script>
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// Flower Power â€” p5.js generative petals
// Bezier petal shapes + Perlin noise for organic variation.
// No sequential PRNG â€” noise(index) gives stable per-petal
// variation that doesn't cascade when parameters change.
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

// â”€â”€ State defaults â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
const DEFAULTS = [
  { count: 7, reach: 0.65, spread: 0.45, twist:  0, petalHue:  50, gapHue: 330, centerHue:  45 }, // A
  { count: 9, reach: 0.55, spread: 0.30, twist: 20, petalHue: 210, gapHue:  15, centerHue: 185 }, // B
  { count: 6, reach: 0.72, spread: 0.60, twist: 45, petalHue:  25, gapHue: 330, centerHue:   5 }, // C
];
const states = DEFAULTS.map(s => ({ ...s }));

// â”€â”€ Curated palettes â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
const PALETTES = [
  { name: 'solar',  p:  50, g: 330, c:  45 },
  { name: 'reef',   p: 210, g:  15, c: 185 },
  { name: 'ember',  p:  25, g: 330, c:   5 },
  { name: 'mist',   p: 270, g: 150, c: 280 },
  { name: 'garden', p: 350, g: 120, c:  10 },
  { name: 'shore',  p: 175, g:  25, c: 190 },
  { name: 'autumn', p:   5, g:  40, c: 355 },
  { name: 'dusk',   p: 280, g:  85, c: 250 },
];

// â”€â”€ Animation state â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
let isPlaying    = true;
let activeTab    = 0;
let animIdx      = 0;
let animPhase    = 'settling';
let dwellTime    = 8;
let dwellElapsed = 0;
let transitionT  = 0;
const TRANS_DUR  = 3.0;

// â”€â”€ Editing state â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// When user drags a slider, show that state immediately.
// Reverts to animation flow 1.5s after last edit.
let isEditing = false;
let editTimer = null;

function startEditing() {
  isEditing = true;
  if (editTimer) clearTimeout(editTimer);
  editTimer = setTimeout(() => { isEditing = false; editTimer = null; }, 1500);
}

// â”€â”€ Paper texture â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
let paperGfx;

function generatePaperTexture() {
  paperGfx.loadPixels();
  for (let i = 0; i < paperGfx.pixels.length; i += 4) {
    let v = random(180, 255);
    paperGfx.pixels[i]     = v;
    paperGfx.pixels[i + 1] = v;
    paperGfx.pixels[i + 2] = v;
    paperGfx.pixels[i + 3] = 255;
  }
  paperGfx.updatePixels();
}

// â”€â”€ p5.js lifecycle â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

function setup() {
  let cnv = createCanvas(windowWidth, windowHeight);
  // Position canvas behind panel and overlays
  cnv.style('position', 'fixed');
  cnv.style('top', '0');
  cnv.style('left', '0');
  cnv.style('z-index', '0');
  cnv.style('display', 'block');

  colorMode(HSB, 360, 100, 100, 100);

  // Paper texture â€” generated once, redrawn on resize
  paperGfx = createGraphics(width, height);
  paperGfx.pixelDensity(1);
  generatePaperTexture();

  initUI();
}

function draw() {
  let panelEl = document.getElementById('panel');
  let pH = panelEl ? panelEl.offsetHeight : 0;
  let visH = height - pH;
  let cx = width / 2;
  let cy = visH / 2;
  let halfSize = min(width, visH) * 0.42;
  let time = millis() / 1000;

  // Cream background
  background(40, 8, 92);

  // Advance animation and get display state
  let dt = min(deltaTime / 1000, 0.1); // Clamp to avoid jumps when tab is backgrounded
  let st = getDisplayState(dt);

  // Draw flower centered above panel
  push();
  translate(cx, cy);
  renderFlower(st, halfSize, time);
  pop();

  // Paper texture overlay â€” multiply at low opacity for grain
  drawingContext.globalCompositeOperation = 'multiply';
  drawingContext.globalAlpha = 0.06;
  drawingContext.drawImage(paperGfx.elt, 0, 0, width, height);
  drawingContext.globalCompositeOperation = 'source-over';
  drawingContext.globalAlpha = 1.0;

  // Status text
  updateStatusText();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  // Re-create paper texture at new dimensions (p5.Graphics can't resize)
  paperGfx.remove();
  paperGfx = createGraphics(width, height);
  paperGfx.pixelDensity(1);
  generatePaperTexture();
  renderAllThumbs();
}

// â”€â”€ Display State Logic â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// Determines what the flower shows this frame.
// Editing: shows the state being edited.
// Paused: shows the settled state.
// Playing: cycles A â†’ B â†’ C â†’ A with smooth transitions.

function getDisplayState(dt) {
  if (isEditing)  return states[activeTab];
  if (!isPlaying) return states[activeTab]; // When paused, show whichever tab is selected

  if (animPhase === 'settling') {
    dwellElapsed += dt;
    if (dwellElapsed >= dwellTime) {
      animPhase    = 'transitioning';
      transitionT  = 0;
      dwellElapsed = 0;
    }
    return states[animIdx];
  }

  // Transitioning between states
  transitionT += dt / TRANS_DUR;
  if (transitionT >= 1) {
    transitionT  = 0;
    animIdx      = (animIdx + 1) % 3;
    animPhase    = 'settling';
    dwellTime    = 5 + random(3);
    return states[animIdx];
  }
  return lerpState(
    states[animIdx],
    states[(animIdx + 1) % 3],
    transitionT
  );
}

// â”€â”€ State Interpolation â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

function lerpState(a, b, t) {
  let et = easeInOutCubic(t);
  return {
    count:     lerp(a.count,     b.count,     et),
    reach:     lerp(a.reach,     b.reach,     et),
    spread:    lerp(a.spread,    b.spread,    et),
    twist:     lerpAngleDeg(a.twist, b.twist, et),
    petalHue:  lerpHue360(a.petalHue,  b.petalHue,  et),
    gapHue:    lerpHue360(a.gapHue,    b.gapHue,    et),
    centerHue: lerpHue360(a.centerHue, b.centerHue, et),
  };
}

function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - pow(-2 * t + 2, 3) / 2;
}

function lerpHue360(a, b, t) {
  let d = ((b - a) % 360 + 360) % 360;
  if (d > 180) d -= 360;
  return ((a + d * t) % 360 + 360) % 360;
}

function lerpAngleDeg(a, b, t) {
  let d = ((b - a) % 360 + 360) % 360;
  if (d > 180) d -= 360;
  return a + d * t;
}

// â”€â”€ Flower Rendering â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// Three concentric petal rings + center bloom.
// All variation driven by noise(index) â€” stable across
// parameter changes, no sequential PRNG cascade.

function renderFlower(st, halfSize, time) {
  let N        = max(3, round(st.count));
  let petalLen = st.reach * halfSize;
  let petalWid = petalLen * (0.18 + st.spread * 0.32);
  let twistRad = radians(st.twist);

  // Continuous ambient animation (always alive, even when paused)
  let breathe    = 1 + (noise(time * 0.32) - 0.5) * 0.10;
  let drift      = (noise(time * 0.08 + 100) - 0.5) * 0.04;
  let slowRotate = time * 0.015; // Very slow continuous rotation (~67s per revolution)

  noStroke();

  // 1. Background wash â€” soft halo behind everything
  for (let i = 3; i >= 0; i--) {
    let wr = petalLen * 1.1 * breathe * (1 + i * 0.15);
    fill(st.petalHue, 35, 78, 5 + i);
    ellipse(0, 0, wr * 2, wr * 2);
  }

  // 2. Gap petals â€” between main petals, shorter, different hue
  for (let i = 0; i < N; i++) {
    let angle   = twistRad + drift + slowRotate + TWO_PI / N * (i + 0.5);
    let flutter = (noise(i * 0.6 + 50, time * 0.18) - 0.5) * 0.06;
    let lenVar  = 1 + (noise(i * 0.4 + 70, time * 0.12) - 0.5) * 0.10;
    drawPetal(
      angle + flutter,
      petalLen * 0.52 * breathe * lenVar,
      petalWid * 0.55,
      st.gapHue, i + 100, time, false
    );
  }

  // 3. Main petals â€” primary visual layer
  for (let i = 0; i < N; i++) {
    let angle   = twistRad + drift + slowRotate + TWO_PI / N * i;
    let flutter = (noise(i * 0.6, time * 0.18) - 0.5) * 0.04;
    let lenVar  = 1 + (noise(i * 0.4, time * 0.12) - 0.5) * 0.08;
    drawPetal(
      angle + flutter,
      petalLen * breathe * lenVar,
      petalWid,
      st.petalHue, i, time, true
    );
  }

  // 4. Inner accent petals â€” rotated half-step, smaller
  for (let i = 0; i < N; i++) {
    let angle   = twistRad + drift + slowRotate + TWO_PI / N * i + PI / N;
    let flutter = (noise(i * 0.6 + 30, time * 0.22) - 0.5) * 0.03;
    drawPetal(
      angle + flutter,
      petalLen * 0.35 * breathe,
      petalWid * 0.40,
      (st.petalHue + 15) % 360, i + 200, time, false
    );
  }

  // 5. Center bloom
  drawCenterBloom(st.centerHue, petalLen * 0.14 * breathe, time);
}

// â”€â”€ Individual Petal â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// Each petal is drawn as 3 layered bezier shapes:
//   1. Soft wash (larger, faint) with shadow glow
//   2. Main body (medium alpha, rich color)
//   3. Dark vein (narrow, high contrast)
// Per-petal variation uses noise(index) â€” stable, no cascade.

function drawPetal(angle, len, wid, hue, noiseIdx, time, useShadow) {
  push();
  rotate(angle);

  // Per-petal flutter from noise (time-varying, gentle)
  let flutter = (noise(noiseIdx * 0.5, time * 0.2) - 0.5) * 0.03;
  rotate(flutter);

  // Stable per-petal shape variation (not time-dependent)
  let tipSkew = (noise(noiseIdx * 0.7 + 200) - 0.5) * wid * 0.18;
  let asymR   = 0.43 + noise(noiseIdx * 0.7 + 300) * 0.12;
  let asymL   = 0.43 + noise(noiseIdx * 0.7 + 400) * 0.12;

  // Per-petal hue shift â€” golden angle spread, stable across count changes
  let h = (hue + sin(noiseIdx * 2.399) * 10 + 360) % 360;

  noStroke();

  // Layer 1: Shadow glow for watercolor bleed (main petals only)
  if (useShadow) {
    drawingContext.shadowBlur  = len * 0.12;
    drawingContext.shadowColor = 'hsla(' + round(h) + ', 55%, 55%, 0.2)';
  }

  // Soft wash â€” larger, fainter
  fill(h, 55, 72, 22);
  petalBezier(len * 1.06, wid * 1.10, tipSkew * 0.7, asymR, asymL);

  // Turn off shadow for subsequent layers
  if (useShadow) {
    drawingContext.shadowBlur  = 0;
    drawingContext.shadowColor = 'transparent';
  }

  // Layer 2: Main petal body â€” rich, visible
  fill(h, 82, 56, 60);
  petalBezier(len, wid, tipSkew, asymR, asymL);

  // Layer 3: Dark vein â€” narrow, high contrast
  fill(h, 90, 36, 40);
  petalBezier(len * 0.78, wid * 0.18, tipSkew * 0.2, 0.50, 0.50);

  pop();
}

// â”€â”€ Petal Bezier Shape â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// Creates a teardrop/petal shape using two bezier curves.
// Base at origin, tip at (tipSkew, -len).
// asymR/asymL control the widest point on each side.

function petalBezier(len, wid, tipSkew, asymR, asymL) {
  beginShape();
  vertex(0, 0);
  // Right side: curves outward then narrows to tip
  bezierVertex(
    wid * asymR,  -len * 0.20,
    wid * 0.52,   -len * 0.58,
    tipSkew,      -len
  );
  // Left side: mirrors back to base
  bezierVertex(
    -wid * asymL, -len * 0.58,
    -wid * 0.40,  -len * 0.20,
    0,            0
  );
  endShape(CLOSE);
}

// â”€â”€ Center Bloom â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// Bright concentric rings at the flower's center.

function drawCenterBloom(hue, radius, time) {
  let breathe = 1 + sin(time * 0.8) * 0.05;
  let r = radius * breathe;
  noStroke();
  for (let i = 5; i >= 0; i--) {
    let t  = i / 5;
    let cr = r * (1 + t * 0.8);
    fill(hue, 80 - i * 8, 82 + i * 3, 55 - i * 7);
    ellipse(0, 0, cr * 2, cr * 2);
  }
}

// â”€â”€ Status Text â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

function updateStatusText() {
  let txt;
  if (isEditing)                     txt = 'editing \u00b7 ' + 'ABC'[activeTab];
  else if (animPhase === 'settling') txt = 'settled \u00b7 ' + 'ABC'[animIdx];
  else                               txt = '\u2192 ' + 'BCA'[animIdx];
  document.getElementById('status').textContent = txt;
}

// â”€â”€ Slider Fill Styling â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

function setFill(el) {
  let pct = ((parseFloat(el.value) - parseFloat(el.min)) /
             (parseFloat(el.max)  - parseFloat(el.min)) * 100).toFixed(1) + '%';
  el.style.setProperty('--fill', pct);
}

// â”€â”€ Sync Sliders to a State â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

function syncToState(idx) {
  let s = states[idx];
  [
    ['s-count',  s.count,  'v-count',  v => '' + Math.round(v)],
    ['s-reach',  s.reach,  'v-reach',  v => v.toFixed(2)],
    ['s-spread', s.spread, 'v-spread', v => v.toFixed(2)],
    ['s-twist',  s.twist,  'v-twist',  v => Math.round(v) + '\u00b0'],
  ].forEach(([id, val, vid, fmt]) => {
    let el = document.getElementById(id);
    el.value = val;
    setFill(el);
    document.getElementById(vid).textContent = fmt(val);
  });
}

// â”€â”€ Build Palette Swatches â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

function buildSwatches() {
  let container = document.getElementById('swatches');
  PALETTES.forEach((pal, i) => {
    let btn = document.createElement('button');
    btn.className   = 'swatch-btn';
    btn.title       = pal.name;
    btn.dataset.idx = i;
    [pal.p, pal.g, pal.c].forEach(hue => {
      let dot = document.createElement('span');
      dot.className = 'swatch-dot';
      dot.style.background = 'hsl(' + hue + ', 68%, 65%)';
      btn.appendChild(dot);
    });
    btn.addEventListener('click', () => {
      let s = states[activeTab];
      s.petalHue = pal.p; s.gapHue = pal.g; s.centerHue = pal.c;
      document.querySelectorAll('.swatch-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      startEditing();
      scheduleThumbRender(activeTab);
    });
    container.appendChild(btn);
  });
}

// â”€â”€ Thumbnail Rendering (vanilla Canvas 2D, fast) â”€â”€â”€â”€â”€â”€â”€â”€
// Uses native canvas API for speed â€” no p5.js overhead.
// Draws simplified single-layer bezier petals.

function renderThumb(idx) {
  let thumb = document.querySelectorAll('.thumb')[idx];
  let tc = thumb.getContext('2d');
  let tw = thumb.width, th = thumb.height;
  let cx = tw / 2, cy = th / 2;
  let half = Math.min(tw, th) * 0.38;
  let st = states[idx];
  let N = Math.max(3, Math.round(st.count));
  let pLen = st.reach * half;
  let pWid = pLen * (0.18 + st.spread * 0.32);
  let twistRad = st.twist * Math.PI / 180;

  tc.fillStyle = '#EAE4D8';
  tc.fillRect(0, 0, tw, th);

  // Simplified petals â€” single layer, no noise
  for (let i = 0; i < N; i++) {
    let angle = twistRad + (Math.PI * 2 / N) * i;
    tc.save();
    tc.translate(cx, cy);
    tc.rotate(angle);
    tc.beginPath();
    tc.moveTo(0, 0);
    tc.bezierCurveTo(
      pWid * 0.45, -pLen * 0.20,
      pWid * 0.50, -pLen * 0.58,
      0,           -pLen
    );
    tc.bezierCurveTo(
      -pWid * 0.48, -pLen * 0.58,
      -pWid * 0.42, -pLen * 0.20,
      0,            0
    );
    tc.closePath();
    tc.fillStyle = 'hsla(' + st.petalHue + ', 78%, 50%, 0.65)';
    tc.fill();
    tc.restore();
  }

  // Center dot
  tc.beginPath();
  tc.arc(cx, cy, pLen * 0.10, 0, Math.PI * 2);
  tc.fillStyle = 'hsl(' + st.centerHue + ', 78%, 70%)';
  tc.fill();
}

let _thumbTimer = null;
function scheduleThumbRender(idx) {
  if (_thumbTimer) cancelAnimationFrame(_thumbTimer);
  _thumbTimer = requestAnimationFrame(() => {
    renderThumb(idx);
    _thumbTimer = null;
  });
}

function renderAllThumbs() {
  for (let i = 0; i < 3; i++) renderThumb(i);
}

// â”€â”€ Initialize UI â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

function initUI() {
  buildSwatches();

  // State tabs
  document.querySelectorAll('.state-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      activeTab = parseInt(tab.dataset.idx);
      document.querySelectorAll('.state-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      syncToState(activeTab);
    });
  });

  // Per-state sliders â€” updates go straight to the state object
  [
    { id: 's-count',  key: 'count',  vid: 'v-count',  fmt: v => '' + Math.round(v) },
    { id: 's-reach',  key: 'reach',  vid: 'v-reach',  fmt: v => v.toFixed(2) },
    { id: 's-spread', key: 'spread', vid: 'v-spread', fmt: v => v.toFixed(2) },
    { id: 's-twist',  key: 'twist',  vid: 'v-twist',  fmt: v => Math.round(v) + '\u00b0' },
  ].forEach(({ id, key, vid, fmt }) => {
    let el = document.getElementById(id);
    setFill(el);
    el.addEventListener('input', () => {
      let val = parseFloat(el.value);
      states[activeTab][key] = val;
      document.getElementById(vid).textContent = fmt(val);
      setFill(el);
      startEditing();
      scheduleThumbRender(activeTab);
    });
  });

  // Play / pause â€” â–¶ when paused, â€– when playing
  let btnPlay = document.getElementById('btn-play');
  btnPlay.addEventListener('click', () => {
    isPlaying = !isPlaying;
    btnPlay.innerHTML = isPlaying ? '&#9646;&#9646;' : '&#9654;';
  });

  syncToState(0);
  renderAllThumbs();
}
</script>
