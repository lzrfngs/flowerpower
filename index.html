<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flower Power</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #EAE4D8; --panel: #DDD7CB; --border: #BFB8A8;
  --text: #4A4030; --dim: #8A8070; --accent: #3A3020; --track: #C8C0B0;
}
body {
  background: var(--cream);
  font-family: 'IBM Plex Mono', monospace;
  width: 100vw; height: 100vh; overflow: hidden; color: var(--text);
}
canvas { position: fixed !important; top: 0; left: 0; z-index: 0; }
#reg-marks { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
#reg-marks span {
  position: absolute; width: 14px; height: 14px;
  border: 1px solid #9A8F80; opacity: 0.28; display: block;
}
#reg-marks span:nth-child(1) { top:14px; left:14px; border-right:0; border-bottom:0; }
#reg-marks span:nth-child(2) { top:14px; right:14px; border-left:0; border-bottom:0; }
#reg-marks span:nth-child(3) { bottom:14px; left:14px; border-right:0; border-top:0; }
#reg-marks span:nth-child(4) { bottom:14px; right:14px; border-left:0; border-top:0; }
#spine {
  position: fixed; left: 14px; top: 50%;
  transform: translateY(-50%) rotate(180deg);
  writing-mode: vertical-rl; font-size: 7px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--dim); opacity: 0.45;
  z-index: 5; pointer-events: none;
}
#panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
  background: var(--panel); border-top: 1px solid var(--border);
  display: flex; align-items: flex-end; padding: 14px 28px 16px; gap: 24px;
}
.ctrl-group { display: flex; flex-direction: column; gap: 5px; flex: 1; max-width: 200px; }
.ctrl-label { font-size: 7px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); }
.ctrl-with-val { display: flex; align-items: center; gap: 7px; }
.ctrl-val {
  font-size: 8px; color: var(--text); font-variant-numeric: tabular-nums;
  min-width: 28px; text-align: right; flex-shrink: 0;
}
input[type=range] {
  -webkit-appearance: none; appearance: none; width: 100%; height: 2px;
  background: linear-gradient(to right,
    var(--accent) 0%, var(--accent) var(--fill, 0%),
    var(--track) var(--fill, 0%), var(--track) 100%);
  outline: none; cursor: pointer; border-radius: 0;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 2px; height: 11px;
  background: var(--accent); border-radius: 0; cursor: pointer;
}
input[type=range]::-moz-range-thumb {
  width: 2px; height: 11px; background: var(--accent);
  border-radius: 0; cursor: pointer; border: none;
}
.hue-dot {
  width: 18px; height: 18px; border-radius: 50%;
  border: 1px solid var(--border); flex-shrink: 0;
  align-self: flex-end; margin-bottom: 1px;
}
#btn-pause {
  width: 34px; height: 34px; background: var(--accent); color: var(--cream);
  border: none; font-size: 12px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
  font-family: inherit; transition: opacity 0.12s; align-self: flex-end;
}
#btn-pause:hover { opacity: 0.75; }
</style>
</head>
<body>

<div id="reg-marks"><span></span><span></span><span></span><span></span></div>
<div id="spine">watercolor &middot; radial &middot; burst</div>

<div id="panel">
  <div class="ctrl-group">
    <span class="ctrl-label">Petals</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-count" min="5" max="9" step="1" value="7">
      <span class="ctrl-val" id="v-count">7</span>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Width</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-width" min="0.3" max="0.9" step="0.01" value="0.62">
      <span class="ctrl-val" id="v-width">0.62</span>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Center</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-center" min="0" max="0.6" step="0.01" value="0.10">
      <span class="ctrl-val" id="v-center">0.10</span>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Hue</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-hue" min="0" max="359" step="1" value="42">
      <span class="ctrl-val" id="v-hue">42</span>
    </div>
  </div>
  <div class="hue-dot" id="hue-preview"></div>
  <div class="ctrl-group">
    <span class="ctrl-label">Gap Hue</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-gap" min="0" max="359" step="1" value="195">
      <span class="ctrl-val" id="v-gap">195</span>
    </div>
  </div>
  <div class="hue-dot" id="gap-preview"></div>
  <button id="btn-pause" title="Play">&#9654;</button>
</div>

<script>
// ─────────────────────────────────────────────────────────
// Flower Power — GLSL watercolor shader (Luft & Deussen)
//
// Pipeline:
// 1. Draw clean hard-edged petal wedges to a p5.Graphics buffer
//    - Red channel = petal hue color (normalized)
//    - Green channel = gap hue color (normalized)
//    - Blue channel = material ID (0=bg, 0.5=gap, 1.0=petal)
// 2. Pass buffer as texture to a GLSL fragment shader
// 3. Shader: Gaussian blur → distance field → smoothstep threshold
//    with noise → edge darkening → paper texture → final color
// ─────────────────────────────────────────────────────────

// Vertex shader — use p5's built-in matrices for correct positioning
var vertSrc = `
attribute vec3 aPosition;
attribute vec2 aTexCoord;
uniform mat4 uModelViewMatrix;
uniform mat4 uProjectionMatrix;
varying vec2 vUv;
void main() {
  vUv = aTexCoord;
  gl_Position = uProjectionMatrix * uModelViewMatrix * vec4(aPosition, 1.0);
}
`;

// Fragment shader — watercolor treatment
var fragSrc = `
precision highp float;

varying vec2 vUv;
uniform sampler2D uShapeBuffer;
uniform vec2 uResolution;
uniform float uTime;
uniform vec3 uPetalColor;
uniform vec3 uGapColor;
uniform vec3 uPaperColor;

// Proper hue rotation in RGB space (rotation around the (1,1,1) axis)
vec3 rotateHue(vec3 col, float angle) {
  float cosA = cos(angle);
  float sinA = sin(angle);
  // Rodrigues rotation around (1,1,1)/sqrt(3)
  float oneMinusCos = 1.0 - cosA;
  float k = 0.57735; // 1/sqrt(3)
  mat3 m = mat3(
    cosA + k*k*oneMinusCos,     k*k*oneMinusCos - k*sinA,   k*k*oneMinusCos + k*sinA,
    k*k*oneMinusCos + k*sinA,   cosA + k*k*oneMinusCos,     k*k*oneMinusCos - k*sinA,
    k*k*oneMinusCos - k*sinA,   k*k*oneMinusCos + k*sinA,   cosA + k*k*oneMinusCos
  );
  return clamp(m * col, 0.0, 1.0);
}

// Better hash — no directional artifacts from sin(dot()) pattern
// Uses multiple fract/sin operations with different constants
float hash(vec2 p) {
  vec3 p3 = fract(vec3(p.xyx) * vec3(0.1031, 0.1030, 0.0973));
  p3 += dot(p3, p3.yzx + 33.33);
  return fract((p3.x + p3.y) * p3.z);
}

float noise2d(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  // Quintic interpolation (smoother than cubic, less banding)
  f = f * f * f * (f * (f * 6.0 - 15.0) + 10.0);
  float a = hash(i);
  float b = hash(i + vec2(1.0, 0.0));
  float c = hash(i + vec2(0.0, 1.0));
  float d = hash(i + vec2(1.0, 1.0));
  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}

// FBM with rotation per octave to break axis-aligned patterns
float fbm(vec2 p) {
  float v = 0.0;
  float amp = 0.5;
  // Rotation matrix (~37 degrees) applied per octave
  mat2 rot = mat2(0.8, 0.6, -0.6, 0.8);
  for (int i = 0; i < 5; i++) {
    v += amp * noise2d(p);
    p = rot * p * 2.1 + vec2(100.0);
    amp *= 0.5;
  }
  return v;
}

void main() {
  vec2 uv = vUv;
  vec2 texel = 1.0 / uResolution;

  // ── Step 1: Gaussian blur of the shape buffer ──
  // 9x9 kernel with noise-jittered offsets to break grid artifacts
  float petalShape = 0.0;
  float gapShape = 0.0;
  float totalWeight = 0.0;
  // Per-pixel jitter seed based on position (breaks grid pattern)
  vec2 jitterSeed = uv * 173.7 + vec2(131.1, 97.3);

  for (int x = -4; x <= 4; x++) {
    for (int y = -4; y <= 4; y++) {
      // Jitter each sample position by ±0.5 texel
      vec2 jitter = vec2(
        hash(jitterSeed + vec2(float(x) * 7.1, float(y) * 3.3)) - 0.5,
        hash(jitterSeed + vec2(float(x) * 3.7, float(y) * 11.1)) - 0.5
      ) * texel;
      vec2 offset = vec2(float(x), float(y)) * texel * 1.5 + jitter;
      float d2 = float(x*x + y*y);
      float w = exp(-d2 / 10.0);
      vec4 s = texture2D(uShapeBuffer, uv + offset);
      petalShape += w * step(0.7, s.b);
      gapShape += w * step(0.3, s.b) * (1.0 - step(0.7, s.b));
      totalWeight += w;
    }
  }
  petalShape /= totalWeight;
  gapShape /= totalWeight;

  // Also sample original hard mask
  vec4 orig = texture2D(uShapeBuffer, uv);
  float origPetal = step(0.7, orig.b);
  float origGap = step(0.3, orig.b) * (1.0 - step(0.7, orig.b));

  // ── Step 2: Domain-warped noise for organic edge variation ──
  vec2 noiseUV = uv * 8.0 + uTime * 0.3;
  float warpX = fbm(noiseUV + vec2(0.0, 0.0));
  float warpY = fbm(noiseUV + vec2(5.2, 1.3));
  float edgeNoise = fbm(noiseUV + vec2(warpX, warpY) * 1.5);

  // ── Step 3: Threshold the distance field with noise ──
  // This is where the watercolor edge magic happens.
  // The threshold varies per-pixel based on noise, so some areas
  // bleed outward and others stay crisp.
  float flowCenter = 0.35;
  float flowWidth = 0.25;
  float noiseShift = (edgeNoise - 0.5) * 0.3;

  float petalMask = smoothstep(
    flowCenter - flowWidth + noiseShift,
    flowCenter + flowWidth + noiseShift,
    petalShape
  );
  float gapMask = smoothstep(
    flowCenter - flowWidth + noiseShift * 0.8,
    flowCenter + flowWidth + noiseShift * 0.8,
    gapShape
  );

  // ── Step 4: Edge darkening (pigment pooling) ──
  // Where shape value is low but above threshold = edge zone
  // Darken there to simulate pigment concentration at drying boundary
  float petalEdge = 1.0 + 0.5 * (1.0 - petalShape) * petalMask;
  float gapEdge = 1.0 + 0.4 * (1.0 - gapShape) * gapMask;

  // ── Step 5: Paper texture ──
  float grain = fbm(uv * 40.0 + 100.0) * 0.12;
  float paperBump = fbm(uv * 15.0 + 50.0) * 0.08;

  // ── Step 6: Composite color ──
  vec3 color = uPaperColor;

  // Multi-scale color variation — 3 noise layers at different frequencies
  // Large: broad warm/cool zones across the whole form
  float colorLarge = fbm(uv * 3.0 + uTime * 0.05 + vec2(3.1, 7.4));
  // Medium: mottling within each stroke
  vec2 medUV = uv * 8.0 + uTime * 0.15;
  float medWarpX = fbm(medUV + vec2(8.9, 2.6));
  float medWarpY = fbm(medUV + vec2(1.4, 6.3));
  float colorMed = fbm(medUV + vec2(medWarpX, medWarpY) * 2.0);
  // Fine: granular pigment variation
  float colorFine = fbm(uv * 25.0 + 200.0);

  // Per-petal hue shift from red channel
  vec4 origSample = texture2D(uShapeBuffer, uv);
  float petalHueAngle = (origSample.r - 0.5) * 1.6; // ±45 degrees in radians

  // Composite brightness + warm/cool + saturation shifts — cranked up
  float brightnessShift = (colorLarge - 0.5) * 1.0 + (colorMed - 0.5) * 0.6;
  vec3 warmShift = vec3(0.18, -0.06, -0.15) * (colorLarge - 0.5) * 3.0;
  vec3 coolShift = vec3(-0.10, 0.06, 0.18) * (colorMed - 0.5) * 2.5;
  float satShift = (colorFine - 0.5) * 0.5;

  // Gap color with variation
  float gapAlpha = gapMask * 0.75 * gapEdge;
  gapAlpha = clamp(gapAlpha + paperBump * gapMask * 0.3, 0.0, 1.0);
  // Rotate gap hue by spatial noise for within-stroke variation
  vec3 gapCol = rotateHue(uGapColor, (colorMed - 0.5) * 0.8);
  gapCol = gapCol * (1.0 - grain) * (1.0 + brightnessShift);
  gapCol += warmShift + coolShift;
  gapCol = mix(gapCol, gapCol * (1.0 + satShift), 0.6);
  color = mix(color, gapCol, gapAlpha);

  // Petal color with per-petal hue shift + spatial variation
  float petalAlpha = petalMask * 0.85 * petalEdge;
  petalAlpha = clamp(petalAlpha + paperBump * petalMask * 0.3, 0.0, 1.0);
  // Per-petal hue rotation + additional spatial hue variation
  vec3 petalBase = rotateHue(uPetalColor, petalHueAngle + (colorLarge - 0.5) * 0.6);
  vec3 petalCol = petalBase * (1.0 - grain) * (1.0 + brightnessShift * 0.8);
  petalCol += warmShift * 0.8 + coolShift * 0.6;
  petalCol = mix(petalCol, petalCol * (1.0 + satShift), 0.6);
  color = mix(color, petalCol, petalAlpha);

  // Darken overlaps (multiply simulation)
  float overlap = petalMask * gapMask;
  color *= 1.0 - overlap * 0.25;

  // Paper grain on everything
  color *= 1.0 - grain * 0.15;

  gl_FragColor = vec4(color, 1.0);
}
`;

// ── Parameters ──
var params = {
  count: 7, width: 0.62, vary: 1.0, centerR: 0.10,
  hue: 42, gapHue: 195, seed: 12345
};

var shapeBuffer = null;
var watercolorShader = null;
var renderRAF = null;
var petalProps = [];

function generatePetalProps() {
  noiseSeed(params.seed);
  randomSeed(params.seed);
  petalProps = [];
  var N = params.count;
  var v = params.vary;
  for (var i = 0; i < N; i++) {
    var s = i * 7.3 + params.seed * 0.01;
    // Per-petal hue shift: each stroke gets its own color drift
    var hueShift = (noise(s + 600) - 0.5) * 90; // ±45 degrees
    petalProps.push({
      lengthMult: 0.65 + noise(s + 0) * 0.70 * v + 0.15,
      angleDrift: (noise(s + 200) - 0.5) * 0.25 * v,
      curvature:  (noise(s + 100) - 0.5) * 0.55 * v,
      hueShift:   hueShift,
      // Right edge: fat blobs, round ends, wild variation
      // w can go above 1.0 for extra-fat shapes
      rightPts: [
        { t: 0.0, w: noise(s+16) * 0.3 },   // base can be wide (not pointed)
        { t: 0.10 + noise(s+10) * 0.15, w: 0.4 + noise(s+11) * 1.0 },
        { t: 0.30 + noise(s+12) * 0.25, w: 0.5 + noise(s+13) * 0.9 },
        { t: 0.60 + noise(s+14) * 0.25, w: 0.2 + noise(s+15) * 0.8 },
        { t: 1.0, w: noise(s+17) * 0.25 },  // tip can be rounded (not pointed)
      ],
      leftPts: [
        { t: 0.0, w: noise(s+26) * 0.3 },
        { t: 0.10 + noise(s+20) * 0.15, w: 0.4 + noise(s+21) * 1.0 },
        { t: 0.30 + noise(s+22) * 0.25, w: 0.5 + noise(s+23) * 0.9 },
        { t: 0.60 + noise(s+24) * 0.25, w: 0.2 + noise(s+25) * 0.8 },
        { t: 1.0, w: noise(s+27) * 0.25 },
      ],
    });
  }
}

// ── p5.js lifecycle ──

function setup() {
  // Use WEBGL for shader support
  var cnv = createCanvas(windowWidth, windowHeight, WEBGL);
  cnv.style('position', 'fixed');
  cnv.style('top', '0');
  cnv.style('left', '0');
  cnv.style('z-index', '0');
  pixelDensity(1);

  // Shape buffer: drawn with p5's 2D renderer
  shapeBuffer = createGraphics(width, height);
  shapeBuffer.pixelDensity(1);

  // Compile watercolor shader
  watercolorShader = createShader(vertSrc, fragSrc);

  generatePetalProps();
  initUI();
  renderBurst();
}

function draw() {}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  shapeBuffer.resizeCanvas(width, height);
  renderBurst();
}

// ── Draw clean hard-edged shapes to buffer ──
// Blue channel encodes material: 1.0 = petal, 0.5 = gap, 0.0 = background
function drawShapesToBuffer() {
  var g = shapeBuffer;
  var panelH = document.getElementById('panel').offsetHeight;
  var visH = g.height - panelH;
  var cx = g.width / 2;
  var cy = visH / 2;
  var baseRadius = 0.40 * Math.min(g.width, visH);
  var innerR = baseRadius * params.centerR;

  var N = params.count;
  var slice = TWO_PI / N;
  var petalHalf = slice * params.width * 0.5;
  var gapHalf = (slice - petalHalf * 2) * 0.5 + petalHalf * 0.2;

  g.background(0, 0, 0); // black = no material (blue channel = 0)
  g.noStroke();
  g.push();
  g.translate(cx, cy);

  // Draw gaps first (blue = 0.5 = 128)
  g.fill(0, 0, 128);
  for (var i = 0; i < N; i++) {
    var ca = slice * i + slice * 0.5;
    var gR = baseRadius * (petalProps[i].lengthMult + petalProps[(i+1)%N].lengthMult) * 0.5 * 0.88;
    // Gaps use simple wedge shape (no unique bezier)
    drawSimpleWedge(g, ca, gapHalf, gR, innerR);
  }

  // Draw petals on top — encode per-petal hue shift in red channel
  for (var i = 0; i < N; i++) {
    var pp = petalProps[i];
    var ca = slice * i + pp.angleDrift;
    var pR = baseRadius * pp.lengthMult;
    var pH = petalHalf * 1.0;
    // Red channel = per-petal hue shift (0-255 maps to -30 to +30 degrees)
    var hueEnc = Math.floor(((pp.hueShift + 30) / 60) * 255);
    g.fill(hueEnc, 0, 255);
    drawBezierPetal(g, ca, pH, pR, pp, innerR);
  }

  g.pop();
}

// Simple wedge for gaps (no unique shape needed)
function drawSimpleWedge(g, centerAngle, halfAngle, maxR, innerR) {
  var segs = 10;
  var iR = innerR || 0;
  g.beginShape();
  g.vertex(Math.cos(centerAngle) * iR, Math.sin(centerAngle) * iR);
  for (var i = 1; i <= segs; i++) {
    var t = i / segs;
    var r = iR + (maxR - iR) * t;
    var w = Math.sin(t * Math.PI) * 0.85 + 0.15; // smooth bulge
    var angle = centerAngle + halfAngle * w;
    g.vertex(Math.cos(angle) * r, Math.sin(angle) * r);
  }
  for (var i = segs; i >= 1; i--) {
    var t = i / segs;
    var r = iR + (maxR - iR) * t;
    var w = Math.sin(t * Math.PI) * 0.85 + 0.15;
    var angle = centerAngle - halfAngle * w;
    g.vertex(Math.cos(angle) * r, Math.sin(angle) * r);
  }
  g.endShape(CLOSE);
}

// Unique petal shape built from per-petal bezier control points.
// Each petal has independently randomized right and left edge profiles,
// creating fundamentally different silhouettes — fat blobs, thin spikes,
// curved paddles, asymmetric teardrops.
function drawBezierPetal(g, centerAngle, halfAngle, maxR, pp, innerR) {
  var segs = 20;
  var iR = innerR || 0;
  var curvature = pp.curvature;

  g.beginShape();
  // Start at inner radius
  g.vertex(Math.cos(centerAngle) * iR, Math.sin(centerAngle) * iR);

  // Right edge — interpolate through control points using Catmull-Rom
  for (var i = 1; i <= segs; i++) {
    var t = i / segs;
    var r = iR + (maxR - iR) * t;
    var w = catmullRomWidth(pp.rightPts, t);
    var bend = curvature * t * t;
    var angle = centerAngle + bend + halfAngle * w;
    g.vertex(Math.cos(angle) * r, Math.sin(angle) * r);
  }

  // Left edge (reverse) — different control points = asymmetric
  for (var i = segs; i >= 1; i--) {
    var t = i / segs;
    var r = iR + (maxR - iR) * t;
    var w = catmullRomWidth(pp.leftPts, t);
    var bend = curvature * t * t;
    var angle = centerAngle + bend - halfAngle * w;
    g.vertex(Math.cos(angle) * r, Math.sin(angle) * r);
  }
  g.endShape(CLOSE);
}

// Catmull-Rom interpolation through width control points.
// pts: array of {t, w} sorted by t. Returns w at position t.
function catmullRomWidth(pts, t) {
  // Find which segment t falls in
  var idx = 0;
  for (var i = 0; i < pts.length - 1; i++) {
    if (t >= pts[i].t && t <= pts[i+1].t) { idx = i; break; }
  }
  // Four control points for Catmull-Rom
  var p0 = pts[Math.max(0, idx - 1)];
  var p1 = pts[idx];
  var p2 = pts[Math.min(pts.length - 1, idx + 1)];
  var p3 = pts[Math.min(pts.length - 1, idx + 2)];
  // Local t within this segment
  var segLen = p2.t - p1.t;
  var lt = segLen > 0.001 ? (t - p1.t) / segLen : 0;
  // Catmull-Rom interpolation
  var lt2 = lt * lt;
  var lt3 = lt2 * lt;
  return 0.5 * (
    (2.0 * p1.w) +
    (-p0.w + p2.w) * lt +
    (2.0 * p0.w - 5.0 * p1.w + 4.0 * p2.w - p3.w) * lt2 +
    (-p0.w + 3.0 * p1.w - 3.0 * p2.w + p3.w) * lt3
  );
}

// ── HSB to RGB conversion for shader uniforms ──
function hsbToRgb(h, s, b) {
  h = ((h % 360) + 360) % 360;
  s /= 100; b /= 100;
  var c = b * s;
  var x = c * (1 - Math.abs((h / 60) % 2 - 1));
  var m = b - c;
  var r, g, bl;
  if (h < 60) { r=c; g=x; bl=0; }
  else if (h < 120) { r=x; g=c; bl=0; }
  else if (h < 180) { r=0; g=c; bl=x; }
  else if (h < 240) { r=0; g=x; bl=c; }
  else if (h < 300) { r=x; g=0; bl=c; }
  else { r=c; g=0; bl=x; }
  return [r+m, g+m, bl+m];
}

// ── Core render ──
function renderBurst() {
  generatePetalProps();

  // 1. Draw clean shapes to buffer
  drawShapesToBuffer();

  // 2. Convert hues to RGB for shader — vivid, saturated colors
  var petalRgb = hsbToRgb(params.hue, 90, 75);
  var gapRgb = hsbToRgb(params.gapHue, 80, 70);

  // 3. Apply watercolor shader
  shader(watercolorShader);
  watercolorShader.setUniform('uShapeBuffer', shapeBuffer);
  watercolorShader.setUniform('uResolution', [width, height]);
  watercolorShader.setUniform('uTime', millis() / 1000.0);
  watercolorShader.setUniform('uPetalColor', petalRgb);
  watercolorShader.setUniform('uGapColor', gapRgb);
  watercolorShader.setUniform('uPaperColor', [0.918, 0.894, 0.847]); // cream

  // Draw a full-screen plane to trigger the fragment shader
  noStroke();
  plane(width, height);
}

// ── UI ──
function setFill(el) {
  var pct = ((parseFloat(el.value) - parseFloat(el.min)) /
             (parseFloat(el.max) - parseFloat(el.min)) * 100).toFixed(1) + '%';
  el.style.setProperty('--fill', pct);
}

function updatePreviews() {
  document.getElementById('hue-preview').style.background =
    'hsl(' + params.hue + ', 75%, 55%)';
  document.getElementById('gap-preview').style.background =
    'hsl(' + params.gapHue + ', 60%, 55%)';
}

function scheduleRender() {
  if (renderRAF) return;
  renderRAF = requestAnimationFrame(function() {
    renderBurst();
    renderRAF = null;
  });
}

function initUI() {
  var sliders = [
    { id: 's-count',  key: 'count',   vid: 'v-count',  fmt: function(v){return ''+Math.round(v);}, parse: Math.round },
    { id: 's-width',  key: 'width',   vid: 'v-width',  fmt: function(v){return v.toFixed(2);} },
    { id: 's-center', key: 'centerR', vid: 'v-center', fmt: function(v){return v.toFixed(2);} },
    { id: 's-hue',    key: 'hue',     vid: 'v-hue',    fmt: function(v){return ''+Math.round(v);}, parse: Math.round },
    { id: 's-gap',    key: 'gapHue',  vid: 'v-gap',    fmt: function(v){return ''+Math.round(v);}, parse: Math.round }
  ];

  sliders.forEach(function(s) {
    var el = document.getElementById(s.id);
    setFill(el);
    el.addEventListener('input', function() {
      var val = parseFloat(el.value);
      if (s.parse) val = s.parse(val);
      params[s.key] = val;
      document.getElementById(s.vid).textContent = s.fmt(val);
      setFill(el);
      updatePreviews();
      scheduleRender();
    });
  });

  // Start paused
  var cycling = false;
  var cycleTimer = null;
  var btnPause = document.getElementById('btn-pause');
  btnPause.addEventListener('click', function() {
    cycling = !cycling;
    if (cycling) {
      cycleTimer = setInterval(function() {
        params.seed = Math.floor(Math.random() * 99999);
        scheduleRender();
      }, 250);
      btnPause.innerHTML = '&#9646;&#9646;';
    } else {
      clearInterval(cycleTimer);
      btnPause.innerHTML = '&#9654;';
    }
  });

  updatePreviews();
}
</script>
</body>
