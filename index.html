<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flower Power</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #EAE4D8; --panel: #DDD7CB; --border: #BFB8A8;
  --text: #4A4030; --dim: #8A8070; --accent: #3A3020; --track: #C8C0B0;
}
body {
  background: var(--cream);
  font-family: 'IBM Plex Mono', monospace;
  width: 100vw; height: 100vh; overflow: hidden; color: var(--text);
}
canvas.p5Canvas {
  position: fixed !important; top: 0; left: 0; z-index: 0;
  /* Light blur softens stamp edges without killing detail */
  filter: blur(3px);
}
#reg-marks { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
#reg-marks span {
  position: absolute; width: 14px; height: 14px;
  border: 1px solid #9A8F80; opacity: 0.28; display: block;
}
#reg-marks span:nth-child(1) { top:14px; left:14px; border-right:0; border-bottom:0; }
#reg-marks span:nth-child(2) { top:14px; right:14px; border-left:0; border-bottom:0; }
#reg-marks span:nth-child(3) { bottom:14px; left:14px; border-right:0; border-top:0; }
#reg-marks span:nth-child(4) { bottom:14px; right:14px; border-left:0; border-top:0; }
#spine {
  position: fixed; left: 14px; top: 50%;
  transform: translateY(-50%) rotate(180deg);
  writing-mode: vertical-rl; font-size: 7px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--dim); opacity: 0.45;
  z-index: 5; pointer-events: none;
}
#panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
  background: var(--panel); border-top: 1px solid var(--border);
  display: flex; align-items: flex-end; padding: 14px 28px 16px; gap: 24px;
}
.ctrl-group { display: flex; flex-direction: column; gap: 5px; flex: 1; max-width: 200px; }
.ctrl-label { font-size: 7px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); }
.ctrl-with-val { display: flex; align-items: center; gap: 7px; }
.ctrl-val {
  font-size: 8px; color: var(--text); font-variant-numeric: tabular-nums;
  min-width: 28px; text-align: right; flex-shrink: 0;
}
input[type=range] {
  -webkit-appearance: none; appearance: none; width: 100%; height: 2px;
  background: linear-gradient(to right,
    var(--accent) 0%, var(--accent) var(--fill, 0%),
    var(--track) var(--fill, 0%), var(--track) 100%);
  outline: none; cursor: pointer; border-radius: 0;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 2px; height: 11px;
  background: var(--accent); border-radius: 0; cursor: pointer;
}
input[type=range]::-moz-range-thumb {
  width: 2px; height: 11px; background: var(--accent);
  border-radius: 0; cursor: pointer; border: none;
}
#btn-seed {
  width: 34px; height: 34px; background: var(--accent); color: var(--cream);
  border: none; font-size: 14px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
  font-family: inherit; transition: opacity 0.12s; align-self: flex-end;
}
#btn-seed:hover { opacity: 0.75; }
.hue-dot {
  width: 18px; height: 18px; border-radius: 50%;
  border: 1px solid var(--border); flex-shrink: 0;
  align-self: flex-end; margin-bottom: 1px;
}
</style>
</head>
<body>

<div id="reg-marks"><span></span><span></span><span></span><span></span></div>
<div id="spine">watercolor &middot; radial &middot; burst</div>

<div id="panel">
  <div class="ctrl-group">
    <span class="ctrl-label">Petals</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-count" min="5" max="16" step="1" value="11">
      <span class="ctrl-val" id="v-count">11</span>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Width</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-width" min="0.3" max="0.9" step="0.01" value="0.62">
      <span class="ctrl-val" id="v-width">0.62</span>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Variation</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-vary" min="0" max="1" step="0.01" value="0.50">
      <span class="ctrl-val" id="v-vary">0.50</span>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Hue</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-hue" min="0" max="359" step="1" value="42">
      <span class="ctrl-val" id="v-hue">42</span>
    </div>
  </div>
  <div class="hue-dot" id="hue-preview"></div>
  <div class="ctrl-group">
    <span class="ctrl-label">Gap Hue</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-gap" min="0" max="359" step="1" value="195">
      <span class="ctrl-val" id="v-gap">195</span>
    </div>
  </div>
  <div class="hue-dot" id="gap-preview"></div>
  <button id="btn-seed" title="New variation">&#8635;</button>
</div>

<script>
// Flower Power - p5.js radial burst
// Performance-optimized: cached offscreen buffer, debounced renders,
// pre-baked paper texture, reduced stamp counts, batch noise lookups.

var params = {
  count: 11, width: 0.62, vary: 0.50,
  hue: 42, gapHue: 195, softness: 0.50, seed: 12345
};

// Persistent offscreen buffer — reused, never recreated per render
var gfx = null;
// Pre-baked paper texture — generated once
var paperTex = null;

var petalProps = [];
var renderRAF = null; // debounce handle

function generatePetalProps() {
  noiseSeed(params.seed);
  randomSeed(params.seed);
  petalProps = [];
  var N = params.count;
  var v = params.vary;
  for (var i = 0; i < N; i++) {
    petalProps.push({
      lengthMult:  1.0 + (noise(i * 1.3 + 0)   - 0.5) * 0.6 * v,
      widthMult:   1.0 + (noise(i * 1.3 + 50)  - 0.5) * 0.7 * v,
      curvature:   (noise(i * 1.3 + 100) - 0.5) * 0.35 * v,
      originShift: (noise(i * 1.3 + 150) - 0.5) * 0.12 * v,
      angleDrift:  (noise(i * 1.3 + 200) - 0.5) * 0.15 * v,
      stampSize:   0.8 + noise(i * 1.3 + 250) * 0.5,
      taper:       0.3 + noise(i * 1.3 + 300) * 0.5,
      dryness:     noise(i * 1.3 + 350),
    });
  }
}

function makePaperTexture(w, h) {
  var tc = document.createElement('canvas');
  tc.width = w; tc.height = h;
  var ctx = tc.getContext('2d');
  var img = ctx.createImageData(w, h);
  var d = img.data;
  // Simple grain in one pass — no p5 overhead
  for (var i = 0; i < d.length; i += 4) {
    var v = 200 + (Math.random() * 55) | 0;
    d[i] = v; d[i+1] = v; d[i+2] = v; d[i+3] = 255;
  }
  ctx.putImageData(img, 0, 0);
  return tc;
}

function setup() {
  var cnv = createCanvas(windowWidth, windowHeight);
  cnv.style('position', 'fixed');
  cnv.style('top', '0');
  cnv.style('left', '0');
  cnv.style('z-index', '0');
  pixelDensity(1);
  colorMode(HSB, 360, 100, 100, 100);
  noLoop();
  noStroke();

  // Create persistent offscreen buffer
  gfx = createGraphics(width, height);
  gfx.pixelDensity(1);
  gfx.colorMode(HSB, 360, 100, 100, 100);
  gfx.noStroke();

  // Pre-bake paper texture
  paperTex = makePaperTexture(width, height);

  generatePetalProps();
  initUI();
  renderBurst();
}

function draw() {}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  gfx.resizeCanvas(width, height);
  paperTex = makePaperTexture(width, height);
  renderBurst();
}

// -- Core rendering --
function renderBurst() {
  var panelH = document.getElementById('panel').offsetHeight;
  var visH = height - panelH;
  var cx = width / 2;
  var cy = visH / 2;
  var baseRadius = 0.38 * min(width, visH);

  noiseSeed(params.seed);
  randomSeed(params.seed);

  var N = params.count;
  var slice = TWO_PI / N;
  var petalHalf = slice * params.width * 0.5;
  var gapHalf = (slice - petalHalf * 2) * 0.5 + petalHalf * 0.15;

  // Clear offscreen buffer to white (multiply identity)
  gfx.background(0, 0, 100);
  gfx.push();
  gfx.translate(cx, cy);

  // 1. Gap fill strokes
  for (var i = 0; i < N; i++) {
    var ca = slice * i + slice * 0.5;
    var gLen = baseRadius * (petalProps[i].lengthMult + petalProps[(i+1)%N].lengthMult) * 0.5;
    var pp = { lengthMult: 1, widthMult: (petalProps[i].widthMult + petalProps[(i+1)%N].widthMult) * 0.5,
               curvature: 0, originShift: 0, angleDrift: 0,
               stampSize: 0.9, taper: 0.4, dryness: 0.3 };
    stampPetal(gfx, ca, gapHalf, gLen, params.gapHue, 0.75, i + 100, pp);
  }

  // 2. Main petal strokes
  for (var i = 0; i < N; i++) {
    var ca = slice * i + petalProps[i].angleDrift;
    var pLen = baseRadius * petalProps[i].lengthMult;
    stampPetal(gfx, ca, petalHalf * petalProps[i].widthMult, pLen,
              params.hue, 1.0, i, petalProps[i]);
  }

  // 3. Overlap darkening strokes
  for (var i = 0; i < N; i++) {
    var ca = slice * i + petalProps[i].angleDrift;
    var pLen = baseRadius * petalProps[i].lengthMult;
    stampOverlap(gfx, ca, petalHalf * 0.3, pLen * 0.7, params.hue, i + 400);
  }

  gfx.pop();

  // -- Compose to main canvas --
  background(40, 8, 92);

  // Background wash
  push();
  translate(cx, cy);
  noStroke();
  for (var r = baseRadius * 1.15; r > baseRadius * 0.2; r -= 8) {
    var a = map(r, baseRadius * 1.15, baseRadius * 0.2, 1.5, 5);
    fill(params.hue, 18, 84, a);
    ellipse(0, 0, r * 2, r * 2);
  }
  pop();

  // Apply multiply buffer TWICE for stronger darkening at overlaps
  drawingContext.globalCompositeOperation = 'multiply';
  drawingContext.drawImage(gfx.elt, 0, 0);
  drawingContext.drawImage(gfx.elt, 0, 0);
  drawingContext.globalCompositeOperation = 'source-over';

  // Edge pooling + center bloom (normal blend, on top)
  push();
  translate(cx, cy);
  noStroke();

  for (var i = 0; i < N; i++) {
    var ga = slice * i + slice * 0.5;
    var gLen = baseRadius * (petalProps[i].lengthMult + petalProps[(i+1)%N].lengthMult) * 0.5;
    stampPooling(ga, gLen, params.gapHue, i + 200);
  }

  stampCenter(baseRadius * 0.20, params.hue);
  pop();

  // Paper texture (pre-baked, single drawImage call)
  drawingContext.globalCompositeOperation = 'multiply';
  drawingContext.globalAlpha = 0.045;
  drawingContext.drawImage(paperTex, 0, 0);
  drawingContext.globalCompositeOperation = 'source-over';
  drawingContext.globalAlpha = 1;
}

// -- Stamp a single petal stroke --
// PERF: reduced from 38x14 to 24x10 stamps per petal.
// Noise lookup reduced: one per radial step, reused across angular steps.
function stampPetal(g, centerAngle, halfAngle, maxR, hue, intensity, nOff, pp) {
  var rSteps = 24;
  var aSteps = 10;
  var baseCR = maxR * 0.060 * pp.stampSize;
  var originR = maxR * pp.originShift;

  for (var ri = 0; ri < rSteps; ri++) {
    var rFrac = ri / rSteps;
    var curveBend = pp.curvature * rFrac * rFrac;
    var r = maxR * (0.04 + rFrac * 0.96) + originR * (1 - rFrac);

    var wMult;
    if (rFrac < 0.3) {
      wMult = 0.4 + rFrac / 0.3 * 0.6;
    } else {
      wMult = 1.0 - (rFrac - 0.3) / 0.7 * (1.0 - pp.taper);
    }

    var drySkip = pp.dryness * 0.25 * rFrac;

    // Pre-compute noise values for this radial step (avoid per-stamp noise calls)
    var nRow = noise(nOff, ri * 0.2);
    var cR = baseCR * wMult * (0.6 + nRow * 0.8);
    var hRow = (noise(nOff + 10, ri * 0.15) - 0.5) * 25;
    var sRow = 60 + noise(nOff + 20, ri * 0.08) * 28;
    var bRow = 55 + noise(nOff + 30, ri * 0.08) * 28;
    var nABase = (noise(nOff * 3, ri * 0.10) - 0.5) * halfAngle * 0.40;
    var nRBase = (noise(nOff * 3 + 50, ri * 0.10) - 0.5) * maxR * 0.05;

    var outerFade = rFrac > 0.78 ? (1 - rFrac) / 0.22 * 0.85 + 0.15 : 1;
    var innerBoost = rFrac < 0.20 ? 1.2 - rFrac / 0.20 * 0.2 : 1;

    for (var ai = 0; ai < aSteps; ai++) {
      if (Math.random() < drySkip) continue;

      var aFrac = (ai / (aSteps - 1)) * 2 - 1;
      var ang = centerAngle + curveBend + halfAngle * aFrac * wMult;

      // Slight per-stamp angular variation (cheap: use aFrac * nABase)
      var nA = nABase * (0.7 + aFrac * 0.6);
      var px = cos(ang + nA) * (r + nRBase);
      var py = sin(ang + nA) * (r + nRBase);

      var edgeFade = 1 - abs(aFrac) * 0.30;
      var alpha = 11 * intensity * edgeFade * outerFade * innerBoost;

      g.fill((hue + hRow + 360) % 360, sRow, bRow, alpha);
      g.ellipse(px, py, cR * 2, cR * 2);
    }
  }
}

// -- Overlap darkening --
function stampOverlap(g, centerAngle, halfAngle, maxR, hue, nOff) {
  var steps = 14;
  for (var ri = 0; ri < steps; ri++) {
    var rFrac = ri / steps;
    var r = maxR * (0.15 + rFrac * 0.85);
    var cR = maxR * 0.022 * (0.7 + noise(nOff, ri * 0.25) * 0.6);
    var oF = rFrac > 0.70 ? (1 - rFrac) / 0.30 : 1;
    for (var li = 0; li < 2; li++) {
      var lOff = (li - 0.5) * halfAngle * 0.4;
      var nA = (noise(nOff * 2, ri * 0.08, li * 0.5) - 0.5) * halfAngle * 0.25;
      var px = cos(centerAngle + lOff + nA) * r;
      var py = sin(centerAngle + lOff + nA) * r;
      g.fill((hue + 360) % 360, 72, 40, 8 * oF);
      g.ellipse(px, py, cR * 2, cR * 2);
    }
  }
}

// -- Edge pooling --
function stampPooling(angle, maxR, hue, nOff) {
  var poolR = maxR * (0.72 + noise(nOff * 2) * 0.22);
  var spread = 0.14 + noise(nOff * 2 + 5) * 0.12;
  for (var i = 0; i < 10; i++) {
    var aO = (noise(nOff, i * 0.35) - 0.5) * spread;
    var rO = (noise(nOff + 30, i * 0.35) - 0.5) * maxR * 0.16;
    var px = cos(angle + aO) * (poolR + rO);
    var py = sin(angle + aO) * (poolR + rO);
    var cr = maxR * (0.025 + noise(nOff + 80, i) * 0.035);
    var dH = (hue + 8 + noise(nOff + 90, i) * 18) % 360;
    fill(dH, 40 + noise(nOff + 95, i) * 20, 35 + noise(nOff + 100, i) * 18, 12);
    ellipse(px, py, cr * 2, cr * 2);
  }
}

// -- Center bloom --
function stampCenter(radius, hue) {
  for (var r = radius * 1.6; r > 0; r -= 3) {
    var t = r / (radius * 1.6);
    fill(hue, 45 + (1 - t) * 28, 74 + (1 - t) * 10, 5 + (1 - t) * 7);
    ellipse(0, 0, r * 2, r * 2);
  }
  for (var r = radius * 0.45; r > 0; r -= 2) {
    var t = r / (radius * 0.45);
    fill((hue + 5) % 360, 68 + (1 - t) * 18, 38 + (1 - t) * 14, 10 + (1 - t) * 14);
    ellipse(0, 0, r * 2, r * 2);
  }
}

// -- UI --
function setFill(el) {
  var pct = ((parseFloat(el.value) - parseFloat(el.min)) /
             (parseFloat(el.max) - parseFloat(el.min)) * 100).toFixed(1) + '%';
  el.style.setProperty('--fill', pct);
}

function updatePreviews() {
  document.getElementById('hue-preview').style.background =
    'hsl(' + params.hue + ', 75%, 55%)';
  document.getElementById('gap-preview').style.background =
    'hsl(' + params.gapHue + ', 60%, 55%)';
}

// Debounced render — slider events fire dozens of times per drag.
// We only render once per animation frame.
function scheduleRender() {
  generatePetalProps();
  if (renderRAF) return; // already scheduled
  renderRAF = requestAnimationFrame(function() {
    renderBurst();
    renderRAF = null;
  });
}

function initUI() {
  var sliders = [
    { id: 's-count', key: 'count',  vid: 'v-count', fmt: function(v){return ''+Math.round(v);}, parse: Math.round },
    { id: 's-width', key: 'width',  vid: 'v-width', fmt: function(v){return v.toFixed(2);} },
    { id: 's-vary',  key: 'vary',   vid: 'v-vary',  fmt: function(v){return v.toFixed(2);} },
    { id: 's-hue',   key: 'hue',    vid: 'v-hue',   fmt: function(v){return ''+Math.round(v);}, parse: Math.round },
    { id: 's-gap',   key: 'gapHue', vid: 'v-gap',   fmt: function(v){return ''+Math.round(v);}, parse: Math.round }
  ];

  sliders.forEach(function(s) {
    var el = document.getElementById(s.id);
    setFill(el);
    el.addEventListener('input', function() {
      var val = parseFloat(el.value);
      if (s.parse) val = s.parse(val);
      params[s.key] = val;
      document.getElementById(s.vid).textContent = s.fmt(val);
      setFill(el);
      updatePreviews();
      scheduleRender();
    });
  });

  document.getElementById('btn-seed').addEventListener('click', function() {
    params.seed = Math.floor(Math.random() * 99999);
    scheduleRender();
  });

  updatePreviews();
}
</script>
</body>
</html>
