<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flower Power</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #EAE4D8; --panel: #DDD7CB; --border: #BFB8A8;
  --text: #4A4030; --dim: #8A8070; --accent: #3A3020; --track: #C8C0B0;
}
body {
  background: var(--cream);
  font-family: 'IBM Plex Mono', monospace;
  width: 100vw; height: 100vh; overflow: hidden; color: var(--text);
}
canvas.p5Canvas {
  position: fixed !important; top: 0; left: 0; z-index: 0;
  filter: blur(4px);
}
#reg-marks { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
#reg-marks span {
  position: absolute; width: 14px; height: 14px;
  border: 1px solid #9A8F80; opacity: 0.28; display: block;
}
#reg-marks span:nth-child(1) { top:14px; left:14px; border-right:0; border-bottom:0; }
#reg-marks span:nth-child(2) { top:14px; right:14px; border-left:0; border-bottom:0; }
#reg-marks span:nth-child(3) { bottom:14px; left:14px; border-right:0; border-top:0; }
#reg-marks span:nth-child(4) { bottom:14px; right:14px; border-left:0; border-top:0; }
#spine {
  position: fixed; left: 14px; top: 50%;
  transform: translateY(-50%) rotate(180deg);
  writing-mode: vertical-rl; font-size: 7px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--dim); opacity: 0.45;
  z-index: 5; pointer-events: none;
}
#panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
  background: var(--panel); border-top: 1px solid var(--border);
  display: flex; align-items: flex-end; padding: 14px 28px 16px; gap: 24px;
}
.ctrl-group { display: flex; flex-direction: column; gap: 5px; flex: 1; max-width: 200px; }
.ctrl-label { font-size: 7px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); }
.ctrl-with-val { display: flex; align-items: center; gap: 7px; }
.ctrl-val {
  font-size: 8px; color: var(--text); font-variant-numeric: tabular-nums;
  min-width: 28px; text-align: right; flex-shrink: 0;
}
input[type=range] {
  -webkit-appearance: none; appearance: none; width: 100%; height: 2px;
  background: linear-gradient(to right,
    var(--accent) 0%, var(--accent) var(--fill, 0%),
    var(--track) var(--fill, 0%), var(--track) 100%);
  outline: none; cursor: pointer; border-radius: 0;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 2px; height: 11px;
  background: var(--accent); border-radius: 0; cursor: pointer;
}
input[type=range]::-moz-range-thumb {
  width: 2px; height: 11px; background: var(--accent);
  border-radius: 0; cursor: pointer; border: none;
}
#btn-seed {
  width: 34px; height: 34px; background: var(--accent); color: var(--cream);
  border: none; font-size: 14px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
  font-family: inherit; transition: opacity 0.12s; align-self: flex-end;
}
#btn-seed:hover { opacity: 0.75; }
.hue-dot {
  width: 18px; height: 18px; border-radius: 50%;
  border: 1px solid var(--border); flex-shrink: 0;
  align-self: flex-end; margin-bottom: 1px;
}
</style>
</head>
<body>

<div id="reg-marks"><span></span><span></span><span></span><span></span></div>
<div id="spine">watercolor &middot; radial &middot; burst</div>

<div id="panel">
  <div class="ctrl-group">
    <span class="ctrl-label">Petals</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-count" min="5" max="9" step="1" value="7">
      <span class="ctrl-val" id="v-count">7</span>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Width</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-width" min="0.3" max="0.9" step="0.01" value="0.62">
      <span class="ctrl-val" id="v-width">0.62</span>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Variation</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-vary" min="0" max="1" step="0.01" value="0.50">
      <span class="ctrl-val" id="v-vary">0.50</span>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Hue</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-hue" min="0" max="359" step="1" value="42">
      <span class="ctrl-val" id="v-hue">42</span>
    </div>
  </div>
  <div class="hue-dot" id="hue-preview"></div>
  <div class="ctrl-group">
    <span class="ctrl-label">Gap Hue</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-gap" min="0" max="359" step="1" value="195">
      <span class="ctrl-val" id="v-gap">195</span>
    </div>
  </div>
  <div class="hue-dot" id="gap-preview"></div>
  <button id="btn-seed" title="New variation">&#8635;</button>
</div>

<script>
// Flower Power - p5.js radial burst
// FILLED WEDGE approach: each petal is a solid polygon drawn multiple
// times at low alpha with noise-distorted edges. No dots — inherently
// smooth continuous tone. ~80 shape fills total vs thousands of ellipses.

var params = {
  count: 7, width: 0.62, vary: 0.50,
  hue: 42, gapHue: 195, seed: 12345
};

var gfx = null;       // persistent offscreen buffer for multiply blending
var paperTex = null;   // pre-baked grain texture
var petalProps = [];
var renderRAF = null;

function generatePetalProps() {
  noiseSeed(params.seed);
  randomSeed(params.seed);
  petalProps = [];
  var N = params.count;
  var v = params.vary;
  for (var i = 0; i < N; i++) {
    petalProps.push({
      lengthMult:  1.0 + (noise(i * 1.3 + 0)   - 0.5) * 0.6 * v,
      widthMult:   1.0 + (noise(i * 1.3 + 50)  - 0.5) * 0.7 * v,
      curvature:   (noise(i * 1.3 + 100) - 0.5) * 0.30 * v,
      angleDrift:  (noise(i * 1.3 + 200) - 0.5) * 0.15 * v,
      edgeRough:   0.3 + noise(i * 1.3 + 250) * 0.7,  // how rough the edges are
      taper:       0.15 + noise(i * 1.3 + 300) * 0.45, // tip width ratio
    });
  }
}

function makePaperTexture(w, h) {
  var tc = document.createElement('canvas');
  tc.width = w; tc.height = h;
  var ctx = tc.getContext('2d');
  var img = ctx.createImageData(w, h);
  var d = img.data;
  for (var i = 0; i < d.length; i += 4) {
    var v = 200 + (Math.random() * 55) | 0;
    d[i] = v; d[i+1] = v; d[i+2] = v; d[i+3] = 255;
  }
  ctx.putImageData(img, 0, 0);
  return tc;
}

function setup() {
  var cnv = createCanvas(windowWidth, windowHeight);
  cnv.style('position', 'fixed');
  cnv.style('top', '0');
  cnv.style('left', '0');
  cnv.style('z-index', '0');
  pixelDensity(1);
  colorMode(HSB, 360, 100, 100, 100);
  noLoop();

  gfx = createGraphics(width, height);
  gfx.pixelDensity(1);
  gfx.colorMode(HSB, 360, 100, 100, 100);
  gfx.noStroke();

  paperTex = makePaperTexture(width, height);
  generatePetalProps();
  initUI();
  renderBurst();
}

function draw() {}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  gfx.resizeCanvas(width, height);
  paperTex = makePaperTexture(width, height);
  renderBurst();
}

// -- Build a wedge polygon --
// Returns an array of {x, y} points defining a petal/wedge shape.
// The shape radiates from center: narrow at origin, widens, then
// tapers to the tip. Noise distorts each vertex for organic edges.
// edgeSegs: number of segments along each side of the wedge.
function buildWedge(centerAngle, halfAngle, maxR, taper, curvature, edgeRough, nOff, layerSeed) {
  var pts = [];
  var segs = 28; // more segments for smooth spline curves

  // Start at center
  pts.push({ x: 0, y: 0 });

  // Right edge: center -> tip
  for (var i = 0; i <= segs; i++) {
    var t = i / segs; // 0 at center, 1 at tip
    var r = maxR * t;

    // Width profile: ease in, peak around 30%, then power-curve taper to pointed tip
    var wFrac;
    if (t < 0.30) {
      // Smooth ease-in from center
      var u = t / 0.30;
      wFrac = u * u * (3 - 2 * u); // smoothstep
    } else {
      // Power curve to tip — drops to near-zero
      var u = (t - 0.30) / 0.70;
      wFrac = (1.0 - u * u) * (1.0 - u * taper);
    }

    // Curvature: angle bends outward
    var bend = curvature * t * t;

    // Noise distortion — amplified toward the tip for organic splay
    var tipAmp = 1 + t * t * 2.5; // 1x at center, 3.5x at tip
    var nR = (noise(nOff * 2 + layerSeed, i * 0.25, 0) - 0.5) * maxR * 0.14 * edgeRough * tipAmp;
    var nA = (noise(nOff * 2 + layerSeed, i * 0.25, 10) - 0.5) * halfAngle * 0.30 * edgeRough * tipAmp;

    var angle = centerAngle + bend + halfAngle * wFrac + nA;
    var dist = r + nR;

    pts.push({ x: cos(angle) * dist, y: sin(angle) * dist });
  }

  // Left edge: tip -> center (reverse direction)
  for (var i = segs; i >= 0; i--) {
    var t = i / segs;
    var r = maxR * t;

    var wFrac;
    if (t < 0.30) {
      var u = t / 0.30;
      wFrac = u * u * (3 - 2 * u);
    } else {
      var u = (t - 0.30) / 0.70;
      wFrac = (1.0 - u * u) * (1.0 - u * taper);
    }

    var bend = curvature * t * t;
    var tipAmp = 1 + t * t * 2.5;
    var nR = (noise(nOff * 2 + layerSeed, i * 0.25, 20) - 0.5) * maxR * 0.14 * edgeRough * tipAmp;
    var nA = (noise(nOff * 2 + layerSeed, i * 0.25, 30) - 0.5) * halfAngle * 0.30 * edgeRough * tipAmp;

    var angle = centerAngle + bend - halfAngle * wFrac + nA;
    var dist = r + nR;

    pts.push({ x: cos(angle) * dist, y: sin(angle) * dist });
  }

  return pts;
}

// -- Draw a filled wedge polygon on a graphics context --
// Uses curveVertex for smooth spline interpolation between points
function drawWedge(g, pts, h, s, b, a) {
  g.fill(h, s, b, a);
  g.beginShape();
  // Repeat first point for curveVertex (it needs a control point before the start)
  g.curveVertex(pts[0].x, pts[0].y);
  for (var i = 0; i < pts.length; i++) {
    g.curveVertex(pts[i].x, pts[i].y);
  }
  // Repeat last point for closing control
  g.curveVertex(pts[pts.length-1].x, pts[pts.length-1].y);
  g.endShape(CLOSE);
}

// -- Draw a filled wedge on the main p5 canvas (global draw calls) --
function drawWedgeMain(pts, h, s, b, a) {
  fill(h, s, b, a);
  beginShape();
  curveVertex(pts[0].x, pts[0].y);
  for (var i = 0; i < pts.length; i++) {
    curveVertex(pts[i].x, pts[i].y);
  }
  curveVertex(pts[pts.length-1].x, pts[pts.length-1].y);
  endShape(CLOSE);
}

// -- Core rendering --
function renderBurst() {
  var panelH = document.getElementById('panel').offsetHeight;
  var visH = height - panelH;
  var cx = width / 2;
  var cy = visH / 2;
  var baseRadius = 0.38 * min(width, visH);

  noiseSeed(params.seed);
  randomSeed(params.seed);

  var N = params.count;
  var slice = TWO_PI / N;
  var petalHalf = slice * params.width * 0.5;
  var gapHalf = (slice - petalHalf * 2) * 0.5 + petalHalf * 0.2;

  // Clear multiply buffer
  gfx.background(0, 0, 100);
  gfx.noStroke();
  gfx.push();
  gfx.translate(cx, cy);

  // -- Layer 1: Gap fills (5 overlapping passes each) --
  for (var i = 0; i < N; i++) {
    var ca = slice * i + slice * 0.5;
    var gR = baseRadius * (petalProps[i].lengthMult + petalProps[(i+1)%N].lengthMult) * 0.5;
    var rough = (petalProps[i].edgeRough + petalProps[(i+1)%N].edgeRough) * 0.5;

    for (var pass = 0; pass < 5; pass++) {
      // Each pass: slightly different shape, hue, size
      var pts = buildWedge(
        ca,
        gapHalf * (0.92 + pass * 0.04),
        gR * (0.94 + pass * 0.03),
        0.3,  // taper
        0,    // no curvature on gaps
        rough * (0.6 + pass * 0.1),
        i + 100,
        pass * 7
      );
      var hShift = (noise(i + 100, pass * 0.5) - 0.5) * 20;
      var sV = 58 + noise(i + 120, pass * 0.4) * 24;
      var bV = 55 + noise(i + 140, pass * 0.4) * 25;
      drawWedge(gfx, pts, (params.gapHue + hShift + 360) % 360, sV, bV, 18);
    }
  }

  // -- Layer 2: Petal strokes (6 overlapping passes each) --
  for (var i = 0; i < N; i++) {
    var pp = petalProps[i];
    var ca = slice * i + pp.angleDrift;
    var pR = baseRadius * pp.lengthMult;
    var pH = petalHalf * pp.widthMult;

    for (var pass = 0; pass < 6; pass++) {
      var pts = buildWedge(
        ca,
        pH * (0.88 + pass * 0.05),
        pR * (0.90 + pass * 0.04),
        pp.taper,
        pp.curvature,
        pp.edgeRough * (0.5 + pass * 0.12),
        i,
        pass * 7 + 3
      );
      var hShift = (noise(i, pass * 0.5) - 0.5) * 22;
      var sV = 62 + noise(i + 20, pass * 0.4) * 26;
      var bV = 52 + noise(i + 40, pass * 0.4) * 28;
      drawWedge(gfx, pts, (params.hue + hShift + 360) % 360, sV, bV, 20);
    }
  }

  // -- Layer 3: Dark spine strokes (2 passes per petal, narrow) --
  for (var i = 0; i < N; i++) {
    var pp = petalProps[i];
    var ca = slice * i + pp.angleDrift;
    var pR = baseRadius * pp.lengthMult * 0.85;

    for (var pass = 0; pass < 2; pass++) {
      var pts = buildWedge(
        ca,
        petalHalf * pp.widthMult * 0.20,
        pR,
        pp.taper * 0.5,
        pp.curvature * 1.2,
        pp.edgeRough * 0.4,
        i + 400,
        pass * 11
      );
      drawWedge(gfx, pts, (params.hue + 5 + 360) % 360, 72, 38, 12);
    }
  }

  gfx.pop();

  // -- Compose to main canvas --
  background(40, 8, 92);

  // Background wash
  push();
  translate(cx, cy);
  noStroke();
  for (var r = baseRadius * 1.15; r > baseRadius * 0.2; r -= 10) {
    var a = map(r, baseRadius * 1.15, baseRadius * 0.2, 1.5, 5);
    fill(params.hue, 18, 84, a);
    ellipse(0, 0, r * 2, r * 2);
  }
  pop();

  // Apply multiply buffer — double pass for strong overlap darkening
  drawingContext.globalCompositeOperation = 'multiply';
  drawingContext.drawImage(gfx.elt, 0, 0);
  drawingContext.drawImage(gfx.elt, 0, 0);
  drawingContext.globalCompositeOperation = 'source-over';

  // Edge pooling + center bloom (normal blend)
  push();
  translate(cx, cy);
  noStroke();

  // Edge pooling: dark wedge fragments at the tips between petals
  for (var i = 0; i < N; i++) {
    var ga = slice * i + slice * 0.5;
    var gR = baseRadius * (petalProps[i].lengthMult + petalProps[(i+1)%N].lengthMult) * 0.5;
    for (var p = 0; p < 3; p++) {
      var pts = buildWedge(
        ga,
        gapHalf * (0.25 + p * 0.08),
        gR * (0.75 + noise(i + 200, p) * 0.2),
        0.1,
        0,
        0.8,
        i + 200,
        p * 13
      );
      var dH = (params.gapHue + 10 + noise(i + 210, p) * 15) % 360;
      drawWedgeMain(pts, dH, 50, 30, 10);
    }
  }

  // Center bloom
  for (var r = baseRadius * 0.32; r > 0; r -= 3) {
    var t = r / (baseRadius * 0.32);
    fill(params.hue, 45 + (1 - t) * 28, 74 + (1 - t) * 10, 5 + (1 - t) * 7);
    ellipse(0, 0, r * 2, r * 2);
  }
  for (var r = baseRadius * 0.09; r > 0; r -= 2) {
    var t = r / (baseRadius * 0.09);
    fill((params.hue + 5) % 360, 68 + (1-t)*18, 38 + (1-t)*14, 10 + (1-t)*14);
    ellipse(0, 0, r * 2, r * 2);
  }

  pop();

  // Paper texture
  drawingContext.globalCompositeOperation = 'multiply';
  drawingContext.globalAlpha = 0.045;
  drawingContext.drawImage(paperTex, 0, 0);
  drawingContext.globalCompositeOperation = 'source-over';
  drawingContext.globalAlpha = 1;
}

// -- UI --
function setFill(el) {
  var pct = ((parseFloat(el.value) - parseFloat(el.min)) /
             (parseFloat(el.max) - parseFloat(el.min)) * 100).toFixed(1) + '%';
  el.style.setProperty('--fill', pct);
}

function updatePreviews() {
  document.getElementById('hue-preview').style.background =
    'hsl(' + params.hue + ', 75%, 55%)';
  document.getElementById('gap-preview').style.background =
    'hsl(' + params.gapHue + ', 60%, 55%)';
}

function scheduleRender() {
  generatePetalProps();
  if (renderRAF) return;
  renderRAF = requestAnimationFrame(function() {
    renderBurst();
    renderRAF = null;
  });
}

function initUI() {
  var sliders = [
    { id: 's-count', key: 'count',  vid: 'v-count', fmt: function(v){return ''+Math.round(v);}, parse: Math.round },
    { id: 's-width', key: 'width',  vid: 'v-width', fmt: function(v){return v.toFixed(2);} },
    { id: 's-vary',  key: 'vary',   vid: 'v-vary',  fmt: function(v){return v.toFixed(2);} },
    { id: 's-hue',   key: 'hue',    vid: 'v-hue',   fmt: function(v){return ''+Math.round(v);}, parse: Math.round },
    { id: 's-gap',   key: 'gapHue', vid: 'v-gap',   fmt: function(v){return ''+Math.round(v);}, parse: Math.round }
  ];

  sliders.forEach(function(s) {
    var el = document.getElementById(s.id);
    setFill(el);
    el.addEventListener('input', function() {
      var val = parseFloat(el.value);
      if (s.parse) val = s.parse(val);
      params[s.key] = val;
      document.getElementById(s.vid).textContent = s.fmt(val);
      setFill(el);
      updatePreviews();
      scheduleRender();
    });
  });

  document.getElementById('btn-seed').addEventListener('click', function() {
    params.seed = Math.floor(Math.random() * 99999);
    scheduleRender();
  });

  updatePreviews();
}
</script>
</body>
</html>
