<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flower Power</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<style>
* { margin: 0; padding: 0; }
body { background: #D4CCB8; width: 100vw; height: 100vh; overflow: hidden; }
canvas { position: fixed; top: 0; left: 0; }
</style>
</head>
<body>
<script>
// ─────────────────────────────────────────────────────────
// Flower Power — Reference Recreation
// Single-pass GLSL: polar cos(Nθ) split into orange/blue,
// softness from smoothstep width, multiply for dark overlaps,
// center glow, plum fringe. No shape buffer, no post-process.
// ─────────────────────────────────────────────────────────

var vertSrc = `
attribute vec3 aPosition;
attribute vec2 aTexCoord;
uniform mat4 uModelViewMatrix;
uniform mat4 uProjectionMatrix;
varying vec2 vUv;
void main() {
  vUv = aTexCoord;
  gl_Position = uProjectionMatrix * uModelViewMatrix * vec4(aPosition, 1.0);
}
`;

var fragSrc = `
precision highp float;
varying vec2 vUv;
uniform vec2 uRes;

// Gradient noise — smooth, no grid-aligned edges
vec2 hashGrad(vec2 p) {
  vec3 p3 = fract(vec3(p.xyx) * vec3(0.1031, 0.1030, 0.0973));
  p3 += dot(p3, p3.yzx + 33.33);
  return fract(vec2((p3.x + p3.y) * p3.z, (p3.y + p3.z) * p3.x)) * 2.0 - 1.0;
}
float gnoise(vec2 p) {
  vec2 i = floor(p), f = fract(p);
  vec2 u = f * f * f * (f * (f * 6.0 - 15.0) + 10.0);
  float a = dot(hashGrad(i), f);
  float b = dot(hashGrad(i + vec2(1,0)), f - vec2(1,0));
  float c = dot(hashGrad(i + vec2(0,1)), f - vec2(0,1));
  float d = dot(hashGrad(i + vec2(1,1)), f - vec2(1,1));
  return mix(mix(a, b, u.x), mix(c, d, u.x), u.y) * 0.5 + 0.5;
}

void main() {
  // Centered, aspect-corrected coordinates
  vec2 uv = (vUv - 0.5) * vec2(uRes.x / uRes.y, 1.0);
  float r = length(uv);
  float theta = atan(uv.y, uv.x);

  // ── Parameters ──
  float N      = 8.0;
  float blur   = 0.06;
  float R_min  = 0.18;
  float R_maxA = 0.37;
  float R_maxB = 0.33;

  // ── Colors ──
  vec3 cream   = vec3(0.831, 0.800, 0.722);
  vec3 orange  = vec3(0.980, 0.482, 0.008);
  vec3 blue    = vec3(0.616, 0.706, 0.820);
  vec3 yellow  = vec3(0.93, 0.84, 0.38);
  vec3 plum    = vec3(0.643, 0.490, 0.588);

  // ── Domain warping — the organic shape maker ──
  // Distort theta and r with low-frequency noise BEFORE computing petal shapes.
  // The cosine wave sees warped coordinates, so each petal comes out a
  // different size/shape — wider here, narrower there, bumpy edges.
  // All continuous functions — zero seams possible.
  float warpA = gnoise(vec2(theta * 1.5 + 100.0, r * 4.0 + 200.0)) * 0.35
              + gnoise(vec2(theta * 3.0 + 300.0, r * 2.0 + 400.0)) * 0.15;
  float warpR = gnoise(vec2(r * 3.0 + 500.0, theta * 2.0 + 600.0)) * 0.04
              + gnoise(vec2(r * 6.0 + 700.0, theta * 1.0 + 800.0)) * 0.02;

  float wTheta = theta + warpA;  // warped angle
  float wR = r + warpR;          // warped radius

  // ── Petal shapes on warped coordinates ──
  float wave = cos(N * wTheta);
  float petalA = smoothstep(-0.25, 0.45, wave);
  float petalB = smoothstep(-0.25, 0.45, -wave);

  // Smooth length variation (sin harmonics on warped theta)
  float lengthVarA = sin(wTheta * 1.0 + 2.3) * 0.03 + sin(wTheta * 3.0 + 5.1) * 0.02;
  float lengthVarB = sin(wTheta * 1.0 + 4.7) * 0.025 + sin(wTheta * 2.0 + 1.9) * 0.015;

  // Radial boundary using warped radius
  float boundA = R_min + (R_maxA + lengthVarA - R_min) * petalA;
  float boundB = R_min + (R_maxB + lengthVarB - R_min) * petalB;

  // Smooth radial masks
  float maskA = smoothstep(boundA + blur, boundA - blur, wR);
  float maskB = smoothstep(boundB + blur, boundB - blur, wR);

  // ── Outer plum fringe ──
  float fringe = smoothstep(0.44, 0.32, r) * 0.22;

  // ── Center glow ──
  float glow   = smoothstep(0.22, 0.0, r);

  // ── Composite (back to front) ──
  vec3 color = cream;

  // 1. Plum fringe halo (very faint, behind everything)
  color = mix(color, plum, fringe);

  // 2. Blue flower layer
  color = mix(color, blue, maskB * 0.80);

  // 3. Orange flower layer
  color = mix(color, orange, maskA * 0.88);

  // 4. Multiply-darken at overlaps (orange × blue = dark olive)
  float overlap = maskA * maskB;
  vec3 bleed = orange * blue;  // ≈ dark olive/amber
  color = mix(color, bleed, overlap * 0.85);

  // 5. Center glow (warm yellow, on top)
  color = mix(color, yellow, glow * 0.65);

  gl_FragColor = vec4(color, 1.0);
}
`;

var sh;

function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);
  pixelDensity(1);
  sh = createShader(vertSrc, fragSrc);
  noLoop();
  redraw();
}

function draw() {
  shader(sh);
  sh.setUniform('uRes', [width, height]);
  noStroke();
  plane(width, height);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  redraw();
}
</script>
</body>
</html>
