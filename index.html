<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flower Power</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<style>
* { margin: 0; padding: 0; }
body { background: #D4CCB8; width: 100vw; height: 100vh; overflow: hidden; }
canvas { position: fixed; top: 0; left: 0; }
</style>
</head>
<body>
<script>
// ─────────────────────────────────────────────────────────
// Flower Power — Reference Recreation
// Single-pass GLSL: polar cos(Nθ) split into orange/blue,
// softness from smoothstep width, multiply for dark overlaps,
// center glow, plum fringe. No shape buffer, no post-process.
// ─────────────────────────────────────────────────────────

var vertSrc = `
attribute vec3 aPosition;
attribute vec2 aTexCoord;
uniform mat4 uModelViewMatrix;
uniform mat4 uProjectionMatrix;
varying vec2 vUv;
void main() {
  vUv = aTexCoord;
  gl_Position = uProjectionMatrix * uModelViewMatrix * vec4(aPosition, 1.0);
}
`;

var fragSrc = `
precision highp float;
varying vec2 vUv;
uniform vec2 uRes;

void main() {
  // Centered, aspect-corrected coordinates
  vec2 uv = (vUv - 0.5) * vec2(uRes.x / uRes.y, 1.0);
  float r = length(uv);
  float theta = atan(uv.y, uv.x);

  // ── Parameters ──
  float N      = 10.0;   // 10 petals (per greyscale ref)
  float blur   = 0.06;
  float R_min  = 0.18;
  float R_maxA = 0.37;   // orange base reach
  float R_maxB = 0.33;   // blue base reach

  // ── Colors ──
  vec3 cream   = vec3(0.831, 0.800, 0.722);
  vec3 orange  = vec3(0.980, 0.482, 0.008);
  vec3 blue    = vec3(0.616, 0.706, 0.820);
  vec3 yellow  = vec3(0.93, 0.84, 0.38);
  vec3 plum    = vec3(0.643, 0.490, 0.588);

  // ── Per-petal hash (deterministic per-petal random) ──
  float sliceAngle = 6.28318 / N;
  float petalIdx = floor((theta + sliceAngle * 0.5) / sliceAngle);
  float gapIdx = floor(theta / sliceAngle);
  // Hash functions: sin(idx * prime) gives stable per-petal random
  float h1 = sin(petalIdx * 3.7 + 1.3) * 0.5 + 0.5; // 0-1
  float h2 = sin(petalIdx * 7.1 + 4.9) * 0.5 + 0.5;
  float h3 = sin(petalIdx * 11.3 + 2.1) * 0.5 + 0.5;
  float h4 = sin(petalIdx * 5.3 + 8.7) * 0.5 + 0.5;
  float g1 = sin(gapIdx * 4.3 + 3.1) * 0.5 + 0.5;

  // Per-petal variation
  float lengthVar = (h1 - 0.5) * 0.12;  // ±12% reach
  float widthVar  = (h2 - 0.5) * 0.04;  // ±4% angular width
  float driftVar  = (h3 - 0.5) * 0.06;  // ±3° angular drift
  float asymVar   = (h4 - 0.5) * 0.02;  // left/right edge asymmetry
  float gapLenVar = (g1 - 0.5) * 0.08;  // ±8% gap reach

  // ── Petal shapes — fat blunt blobs with per-petal variation ──
  // Angle within current petal/gap slice, with per-petal drift
  float localA = mod(theta + sliceAngle * 0.5, sliceAngle) - sliceAngle * 0.5 - driftVar;
  float localA_gap = mod(theta, sliceAngle) - sliceAngle * 0.5;

  // Width grows with radius (fat tips) + per-petal variation
  float petalWidth = sliceAngle * (0.15 + r * 0.8) + widthVar;
  float gapWidth = sliceAngle * (0.12 + r * 0.6);

  // Asymmetric edges: offset the center so one side is wider
  float asymOffset = asymVar * r;

  // Angular masks
  float petalA = smoothstep(petalWidth + blur * 0.5, petalWidth - blur * 2.0, abs(localA + asymOffset));
  float petalB = smoothstep(gapWidth - widthVar + blur * 0.5, gapWidth - widthVar - blur * 2.0, abs(localA_gap));

  // Radial masks with per-petal length variation
  float thisR_maxA = R_maxA + lengthVar;
  float thisR_maxB = R_maxB + gapLenVar;
  float rMaskA = smoothstep(thisR_maxA + blur, thisR_maxA - blur, r) * smoothstep(R_min - blur * 2.0, R_min + blur, r);
  float rMaskB = smoothstep(thisR_maxB + blur, thisR_maxB - blur, r) * smoothstep(R_min - blur * 2.0, R_min + blur, r);

  float maskA = petalA * rMaskA;
  float maskB = petalB * rMaskB;

  // ── Outer plum fringe ──
  float fringe = smoothstep(0.44, 0.32, r) * 0.22;

  // ── Center glow ──
  float glow   = smoothstep(0.22, 0.0, r);

  // ── Composite (back to front) ──
  vec3 color = cream;

  // 1. Plum fringe halo (very faint, behind everything)
  color = mix(color, plum, fringe);

  // 2. Blue flower layer
  color = mix(color, blue, maskB * 0.80);

  // 3. Orange flower layer
  color = mix(color, orange, maskA * 0.88);

  // 4. Multiply-darken at overlaps (orange × blue = dark olive)
  float overlap = maskA * maskB;
  vec3 bleed = orange * blue;  // ≈ dark olive/amber
  color = mix(color, bleed, overlap * 0.85);

  // 5. Center glow (warm yellow, on top)
  color = mix(color, yellow, glow * 0.65);

  gl_FragColor = vec4(color, 1.0);
}
`;

var sh;

function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);
  pixelDensity(1);
  sh = createShader(vertSrc, fragSrc);
  noLoop();
  redraw();
}

function draw() {
  shader(sh);
  sh.setUniform('uRes', [width, height]);
  noStroke();
  plane(width, height);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  redraw();
}
</script>
</body>
</html>
