<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flower Power</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #EAE4D8; --panel: #DDD7CB; --border: #BFB8A8;
  --text: #4A4030; --dim: #8A8070; --accent: #3A3020; --track: #C8C0B0;
}
body {
  background: var(--cream);
  font-family: 'IBM Plex Mono', monospace;
  width: 100vw; height: 100vh; overflow: hidden; color: var(--text);
}
canvas.p5Canvas {
  position: fixed !important; top: 0; left: 0; z-index: 0;
}
#reg-marks { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
#reg-marks span {
  position: absolute; width: 14px; height: 14px;
  border: 1px solid #9A8F80; opacity: 0.28; display: block;
}
#reg-marks span:nth-child(1) { top:14px; left:14px; border-right:0; border-bottom:0; }
#reg-marks span:nth-child(2) { top:14px; right:14px; border-left:0; border-bottom:0; }
#reg-marks span:nth-child(3) { bottom:14px; left:14px; border-right:0; border-top:0; }
#reg-marks span:nth-child(4) { bottom:14px; right:14px; border-left:0; border-top:0; }
#spine {
  position: fixed; left: 14px; top: 50%;
  transform: translateY(-50%) rotate(180deg);
  writing-mode: vertical-rl; font-size: 7px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--dim); opacity: 0.45;
  z-index: 5; pointer-events: none;
}
#panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
  background: var(--panel); border-top: 1px solid var(--border);
  display: flex; align-items: flex-end; padding: 14px 28px 16px; gap: 24px;
}
.ctrl-group { display: flex; flex-direction: column; gap: 5px; flex: 1; max-width: 200px; }
.ctrl-label { font-size: 7px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); }
.ctrl-with-val { display: flex; align-items: center; gap: 7px; }
.ctrl-val {
  font-size: 8px; color: var(--text); font-variant-numeric: tabular-nums;
  min-width: 28px; text-align: right; flex-shrink: 0;
}
input[type=range] {
  -webkit-appearance: none; appearance: none; width: 100%; height: 2px;
  background: linear-gradient(to right,
    var(--accent) 0%, var(--accent) var(--fill, 0%),
    var(--track) var(--fill, 0%), var(--track) 100%);
  outline: none; cursor: pointer; border-radius: 0;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 2px; height: 11px;
  background: var(--accent); border-radius: 0; cursor: pointer;
}
input[type=range]::-moz-range-thumb {
  width: 2px; height: 11px; background: var(--accent);
  border-radius: 0; cursor: pointer; border: none;
}
.hue-dot {
  width: 18px; height: 18px; border-radius: 50%;
  border: 1px solid var(--border); flex-shrink: 0;
  align-self: flex-end; margin-bottom: 1px;
}
</style>
</head>
<body>

<div id="reg-marks"><span></span><span></span><span></span><span></span></div>
<div id="spine">watercolor &middot; radial &middot; burst</div>

<div id="panel">
  <div class="ctrl-group">
    <span class="ctrl-label">Petals</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-count" min="5" max="9" step="1" value="7">
      <span class="ctrl-val" id="v-count">7</span>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Width</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-width" min="0.3" max="0.9" step="0.01" value="0.62">
      <span class="ctrl-val" id="v-width">0.62</span>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Center</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-center" min="0" max="0.6" step="0.01" value="0.10">
      <span class="ctrl-val" id="v-center">0.10</span>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Hue</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-hue" min="0" max="359" step="1" value="42">
      <span class="ctrl-val" id="v-hue">42</span>
    </div>
  </div>
  <div class="hue-dot" id="hue-preview"></div>
  <div class="ctrl-group">
    <span class="ctrl-label">Gap Hue</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-gap" min="0" max="359" step="1" value="195">
      <span class="ctrl-val" id="v-gap">195</span>
    </div>
  </div>
  <div class="hue-dot" id="gap-preview"></div>
  <button id="btn-pause" style="width:34px;height:34px;background:var(--accent);color:var(--cream);border:none;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;transition:opacity 0.12s;align-self:flex-end" title="Pause/Play">&#9654;</button>
</div>

<script>
// Flower Power — Tyler Hobbs watercolor algorithm
// Polygon subdivision with Gaussian displacement, stacked at low alpha.
// ~40 transparent layers per shape, edges feather naturally.
// No CSS blur needed — the technique IS the softness.

var params = {
  count: 7, width: 0.62, vary: 1.0, centerR: 0.10,
  hue: 42, gapHue: 195, seed: 12345
};

var gfx = null;
var paperTex = null;
var petalProps = [];
var renderRAF = null;

function generatePetalProps() {
  noiseSeed(params.seed);
  randomSeed(params.seed);
  petalProps = [];
  var N = params.count;
  var v = params.vary;
  for (var i = 0; i < N; i++) {
    petalProps.push({
      lengthMult:  1.0 + (noise(i * 1.3 + 0) - 0.5) * 0.6 * v,
      widthMult:   1.0 + (noise(i * 1.3 + 50) - 0.5) * 0.7 * v,
      curvature:   (noise(i * 1.3 + 100) - 0.5) * 0.30 * v,
      angleDrift:  (noise(i * 1.3 + 200) - 0.5) * 0.15 * v,
      edgeRough:   0.4 + noise(i * 1.3 + 250) * 0.6,
      taper:       0.08 + noise(i * 1.3 + 300) * 0.25,
    });
  }
}

function makePaperTexture(w, h) {
  var tc = document.createElement('canvas');
  tc.width = w; tc.height = h;
  var ctx = tc.getContext('2d');
  var img = ctx.createImageData(w, h);
  var d = img.data;
  for (var i = 0; i < d.length; i += 4) {
    var v = 200 + (Math.random() * 55) | 0;
    d[i] = v; d[i+1] = v; d[i+2] = v; d[i+3] = 255;
  }
  ctx.putImageData(img, 0, 0);
  return tc;
}

function setup() {
  var cnv = createCanvas(windowWidth, windowHeight);
  cnv.style('position', 'fixed');
  cnv.style('top', '0');
  cnv.style('left', '0');
  cnv.style('z-index', '0');
  pixelDensity(1);
  colorMode(HSB, 360, 100, 100, 100);
  noLoop();

  gfx = createGraphics(width, height);
  gfx.pixelDensity(1);
  gfx.colorMode(HSB, 360, 100, 100, 100);
  gfx.noStroke();

  paperTex = makePaperTexture(width, height);
  generatePetalProps();
  initUI();
  renderBurst();
}

function draw() {}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  gfx.resizeCanvas(width, height);
  paperTex = makePaperTexture(width, height);
  renderBurst();
}

// ── Jitter Transform ─────────────────────────────────────
// Instead of deforming polygon edges (which causes pinching),
// jitter the ENTIRE shape: random rotation, non-uniform scale,
// and translation offset. The feathered watercolor edge emerges
// from layering many slightly-different clean copies.

function jitterPoly(poly, maxR) {
  // Random rotation
  var rot = (random(-1, 1) + random(-1, 1)) * 0.5 * 0.06;
  // Non-uniform scale — stretches/squashes each copy differently
  var sx = 0.90 + random() * 0.20;
  var sy = 0.90 + random() * 0.20;
  // Translation offset
  var tx = (random(-1, 1) + random(-1, 1)) * 0.5 * maxR * 0.06;
  var ty = (random(-1, 1) + random(-1, 1)) * 0.5 * maxR * 0.06;

  var cosR = cos(rot), sinR = sin(rot);
  var pts = [];
  for (var i = 0; i < poly.length; i++) {
    var x = poly[i].x * sx;
    var y = poly[i].y * sy;
    pts.push({
      x: x * cosR - y * sinR + tx,
      y: x * sinR + y * cosR + ty
    });
  }
  return pts;
}

// ── Build a wedge base polygon ───────────────────────────
// Returns a clean polygon (few vertices) defining the petal wedge.
// This gets subdivided/deformed for each layer.

function buildWedgeBase(centerAngle, halfAngle, maxR, taper, curvature, innerR) {
  var pts = [];
  var segs = 6;
  var iR = innerR || 0; // inner radius — petals start here instead of center

  // Start point at inner radius
  pts.push({ x: cos(centerAngle) * iR, y: sin(centerAngle) * iR });

  // Right edge
  for (var i = 1; i <= segs; i++) {
    var t = i / segs;
    var r = iR + (maxR - iR) * t;
    var wFrac;
    if (t < 0.30) {
      var u = t / 0.30;
      wFrac = u * u * (3 - 2 * u);
    } else {
      var u = (t - 0.30) / 0.70;
      wFrac = (1.0 - u * u) * (1.0 - u * taper);
    }
    var bend = curvature * t * t;
    var angle = centerAngle + bend + halfAngle * wFrac;
    pts.push({ x: cos(angle) * r, y: sin(angle) * r });
  }

  // Left edge (reverse)
  for (var i = segs; i >= 1; i--) {
    var t = i / segs;
    var r = iR + (maxR - iR) * t;
    var wFrac;
    if (t < 0.30) {
      var u = t / 0.30;
      wFrac = u * u * (3 - 2 * u);
    } else {
      var u = (t - 0.30) / 0.70;
      wFrac = (1.0 - u * u) * (1.0 - u * taper);
    }
    var bend = curvature * t * t;
    var angle = centerAngle + bend - halfAngle * wFrac;
    pts.push({ x: cos(angle) * r, y: sin(angle) * r });
  }

  return pts;
}

// ── Draw a polygon ───────────────────────────────────────

function drawPoly(g, pts, h, s, b, a) {
  g.fill(h, s, b, a);
  g.beginShape();
  for (var i = 0; i < pts.length; i++) {
    g.vertex(pts[i].x, pts[i].y);
  }
  g.endShape(CLOSE);
}

function drawPolyMain(pts, h, s, b, a) {
  fill(h, s, b, a);
  beginShape();
  for (var i = 0; i < pts.length; i++) {
    vertex(pts[i].x, pts[i].y);
  }
  endShape(CLOSE);
}

// ── Core Rendering ───────────────────────────────────────

function renderBurst() {
  var panelH = document.getElementById('panel').offsetHeight;
  var visH = height - panelH;
  var cx = width / 2;
  var cy = visH / 2;
  var baseRadius = 0.55 * min(width, visH);

  noiseSeed(params.seed);
  randomSeed(params.seed);

  var N = params.count;
  var slice = TWO_PI / N;
  var petalHalf = slice * params.width * 0.5;
  var gapHalf = (slice - petalHalf * 2) * 0.5 + petalHalf * 0.2;

  var LAYERS = 45;       // layers per shape
  var ALPHA = 4;          // alpha per layer (out of 100)

  var innerR = baseRadius * params.centerR;

  // Clear multiply buffer
  gfx.background(0, 0, 100);
  gfx.noStroke();
  gfx.push();
  gfx.translate(cx, cy);

  // Build all base polygons first
  var petalBases = [];
  var gapBases = [];

  for (var i = 0; i < N; i++) {
    var pp = petalProps[i];
    var ca = slice * i + pp.angleDrift;
    var pR = baseRadius * pp.lengthMult;
    var pH = petalHalf * pp.widthMult;
    petalBases.push(buildWedgeBase(ca, pH, pR, pp.taper, pp.curvature, innerR));
  }

  for (var i = 0; i < N; i++) {
    var ca = slice * i + slice * 0.5;
    var gR = baseRadius * (petalProps[i].lengthMult + petalProps[(i+1)%N].lengthMult) * 0.5;
    gapBases.push(buildWedgeBase(ca, gapHalf, gR * 0.88, 0.2, 0, innerR));
  }

  // Interleave layers: draw gap layers and petal layers alternating
  // so colors mix optically in overlap zones
  var batchSize = 5;
  for (var layer = 0; layer < LAYERS; layer += batchSize) {

    // Gap layers batch
    for (var i = 0; i < N; i++) {
      var rough = (petalProps[i].edgeRough + petalProps[(i+1)%N].edgeRough) * 0.5;
      var gR = baseRadius * (petalProps[i].lengthMult + petalProps[(i+1)%N].lengthMult) * 0.5;
      for (var j = layer; j < layer + batchSize && j < LAYERS; j++) {
        var jittered = jitterPoly(gapBases[i], gR);
        var hShift = (randomGaussian() * 8);
        var sV = 55 + random(20);
        var bV = 55 + random(25);
        drawPoly(gfx, jittered, (params.gapHue + hShift + 360) % 360, sV, bV, ALPHA);
      }
    }

    // Petal layers batch
    for (var i = 0; i < N; i++) {
      var pp = petalProps[i];
      var pR = baseRadius * pp.lengthMult;
      for (var j = layer; j < layer + batchSize && j < LAYERS; j++) {
        var jittered = jitterPoly(petalBases[i], pR);
        var hShift = (randomGaussian() * 10);
        var sV = 58 + random(24);
        var bV = 50 + random(28);
        drawPoly(gfx, jittered, (params.hue + hShift + 360) % 360, sV, bV, ALPHA);
      }
    }
  }

  gfx.pop();

  // -- Compose --
  background(40, 8, 92);

  // Background wash
  push();
  translate(cx, cy);
  noStroke();
  for (var r = baseRadius * 1.15; r > baseRadius * 0.2; r -= 10) {
    var a = map(r, baseRadius * 1.15, baseRadius * 0.2, 1.5, 5);
    fill(params.hue, 18, 84, a);
    ellipse(0, 0, r * 2, r * 2);
  }
  pop();

  // Multiply compositing — double pass
  drawingContext.globalCompositeOperation = 'multiply';
  drawingContext.drawImage(gfx.elt, 0, 0);
  drawingContext.drawImage(gfx.elt, 0, 0);
  drawingContext.globalCompositeOperation = 'source-over';

  // Center bloom (normal blend) — scales with center radius
  var bloomR = max(innerR, baseRadius * 0.12);
  push();
  translate(cx, cy);
  noStroke();
  for (var r = bloomR * 1.4; r > 0; r -= 3) {
    var t = r / (bloomR * 1.4);
    fill(params.hue, 45 + (1-t)*28, 74 + (1-t)*10, 5 + (1-t)*7);
    ellipse(0, 0, r * 2, r * 2);
  }
  for (var r = bloomR * 0.4; r > 0; r -= 2) {
    var t = r / (bloomR * 0.4);
    fill((params.hue+5)%360, 68+(1-t)*18, 38+(1-t)*14, 10+(1-t)*14);
    ellipse(0, 0, r * 2, r * 2);
  }
  pop();

  // Paper texture
  drawingContext.globalCompositeOperation = 'multiply';
  drawingContext.globalAlpha = 0.045;
  drawingContext.drawImage(paperTex, 0, 0);
  drawingContext.globalCompositeOperation = 'source-over';
  drawingContext.globalAlpha = 1;
}

// -- UI --
function setFill(el) {
  var pct = ((parseFloat(el.value) - parseFloat(el.min)) /
             (parseFloat(el.max) - parseFloat(el.min)) * 100).toFixed(1) + '%';
  el.style.setProperty('--fill', pct);
}

function updatePreviews() {
  document.getElementById('hue-preview').style.background =
    'hsl(' + params.hue + ', 75%, 55%)';
  document.getElementById('gap-preview').style.background =
    'hsl(' + params.gapHue + ', 60%, 55%)';
}

function scheduleRender() {
  generatePetalProps();
  if (renderRAF) return;
  renderRAF = requestAnimationFrame(function() {
    renderBurst();
    renderRAF = null;
  });
}

function initUI() {
  var sliders = [
    { id: 's-count',  key: 'count',   vid: 'v-count',  fmt: function(v){return ''+Math.round(v);}, parse: Math.round },
    { id: 's-width',  key: 'width',   vid: 'v-width',  fmt: function(v){return v.toFixed(2);} },
    { id: 's-center', key: 'centerR', vid: 'v-center', fmt: function(v){return v.toFixed(2);} },
    { id: 's-hue',    key: 'hue',     vid: 'v-hue',    fmt: function(v){return ''+Math.round(v);}, parse: Math.round },
    { id: 's-gap',   key: 'gapHue', vid: 'v-gap',   fmt: function(v){return ''+Math.round(v);}, parse: Math.round }
  ];

  sliders.forEach(function(s) {
    var el = document.getElementById(s.id);
    setFill(el);
    el.addEventListener('input', function() {
      var val = parseFloat(el.value);
      if (s.parse) val = s.parse(val);
      params[s.key] = val;
      document.getElementById(s.vid).textContent = s.fmt(val);
      setFill(el);
      updatePreviews();
      scheduleRender();
    });
  });

  // Start paused — user presses play
  var cycling = false;
  var cycleTimer = null;

  // Pause/play button
  var btnPause = document.getElementById('btn-pause');
  btnPause.addEventListener('click', function() {
    cycling = !cycling;
    if (cycling) {
      cycleTimer = setInterval(function() {
        params.seed = Math.floor(Math.random() * 99999);
        scheduleRender();
      }, 250);
      btnPause.innerHTML = '&#9646;&#9646;';
    } else {
      clearInterval(cycleTimer);
      btnPause.innerHTML = '&#9654;';
    }
  });

  updatePreviews();
}
</script>
</body>
</html>
