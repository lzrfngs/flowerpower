<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flower Power</title>
<!--
  Rendering: p5.js radial brush-stamp technique.
  Hundreds of overlapping semi-transparent circles simulate wide
  watercolor brush strokes radiating from center. CSS blur applied
  to the canvas creates the final painted look.
  Renders once per parameter change, not 60fps.
-->
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #EAE4D8; --panel: #DDD7CB; --border: #BFB8A8;
  --text: #4A4030; --dim: #8A8070; --accent: #3A3020; --track: #C8C0B0;
}
body {
  background: var(--cream);
  font-family: 'IBM Plex Mono', monospace;
  width: 100vw; height: 100vh; overflow: hidden; color: var(--text);
}
canvas.p5Canvas {
  position: fixed !important; top: 0; left: 0; z-index: 0;
  filter: blur(8px);
}
#reg-marks { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
#reg-marks span {
  position: absolute; width: 14px; height: 14px;
  border: 1px solid #9A8F80; opacity: 0.28; display: block;
}
#reg-marks span:nth-child(1) { top:14px; left:14px; border-right:0; border-bottom:0; }
#reg-marks span:nth-child(2) { top:14px; right:14px; border-left:0; border-bottom:0; }
#reg-marks span:nth-child(3) { bottom:14px; left:14px; border-right:0; border-top:0; }
#reg-marks span:nth-child(4) { bottom:14px; right:14px; border-left:0; border-top:0; }
#spine {
  position: fixed; left: 14px; top: 50%;
  transform: translateY(-50%) rotate(180deg);
  writing-mode: vertical-rl; font-size: 7px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--dim); opacity: 0.45;
  z-index: 5; pointer-events: none;
}
#panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
  background: var(--panel); border-top: 1px solid var(--border);
  display: flex; align-items: flex-end; padding: 14px 28px 16px; gap: 24px;
}
.ctrl-group { display: flex; flex-direction: column; gap: 5px; flex: 1; max-width: 200px; }
.ctrl-label { font-size: 7px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); }
.ctrl-with-val { display: flex; align-items: center; gap: 7px; }
.ctrl-val {
  font-size: 8px; color: var(--text); font-variant-numeric: tabular-nums;
  min-width: 28px; text-align: right; flex-shrink: 0;
}
input[type=range] {
  -webkit-appearance: none; appearance: none; width: 100%; height: 2px;
  background: linear-gradient(to right,
    var(--accent) 0%, var(--accent) var(--fill, 0%),
    var(--track) var(--fill, 0%), var(--track) 100%);
  outline: none; cursor: pointer; border-radius: 0;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 2px; height: 11px;
  background: var(--accent); border-radius: 0; cursor: pointer;
}
input[type=range]::-moz-range-thumb {
  width: 2px; height: 11px; background: var(--accent);
  border-radius: 0; cursor: pointer; border: none;
}
#btn-seed {
  width: 34px; height: 34px; background: var(--accent); color: var(--cream);
  border: none; font-size: 14px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
  font-family: inherit; transition: opacity 0.12s; align-self: flex-end;
}
#btn-seed:hover { opacity: 0.75; }
.hue-dot {
  width: 18px; height: 18px; border-radius: 50%;
  border: 1px solid var(--border); flex-shrink: 0;
  align-self: flex-end; margin-bottom: 1px;
}
</style>
</head>
<body>

<div id="reg-marks"><span></span><span></span><span></span><span></span></div>
<div id="spine">watercolor &middot; radial &middot; burst</div>

<div id="panel">
  <div class="ctrl-group">
    <span class="ctrl-label">Petals</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-count" min="5" max="16" step="1" value="11">
      <span class="ctrl-val" id="v-count">11</span>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Width</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-width" min="0.3" max="0.9" step="0.01" value="0.62">
      <span class="ctrl-val" id="v-width">0.62</span>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Size</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-size" min="0.25" max="0.60" step="0.01" value="0.38">
      <span class="ctrl-val" id="v-size">0.38</span>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Hue</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-hue" min="0" max="359" step="1" value="42">
      <span class="ctrl-val" id="v-hue">42</span>
    </div>
  </div>
  <div class="hue-dot" id="hue-preview"></div>
  <div class="ctrl-group">
    <span class="ctrl-label">Gap Hue</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-gap" min="0" max="359" step="1" value="195">
      <span class="ctrl-val" id="v-gap">195</span>
    </div>
  </div>
  <div class="hue-dot" id="gap-preview"></div>
  <div class="ctrl-group">
    <span class="ctrl-label">Softness</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-blur" min="2" max="18" step="0.5" value="8">
      <span class="ctrl-val" id="v-blur">8</span>
    </div>
  </div>
  <button id="btn-seed" title="New variation">&#8635;</button>
</div>

<script>
// Flower Power - p5.js radial burst
// Brush-stamp technique: overlapping circles simulate watercolor.

var params = {
  count: 11, width: 0.62, size: 0.38,
  hue: 42, gapHue: 195, blur: 8, seed: 12345
};

var dirty = true;

function setup() {
  var cnv = createCanvas(windowWidth, windowHeight);
  cnv.style('position', 'fixed');
  cnv.style('top', '0');
  cnv.style('left', '0');
  cnv.style('z-index', '0');
  pixelDensity(1);
  colorMode(HSB, 360, 100, 100, 100);
  noLoop();
  noStroke();
  initUI();
  renderBurst();
}

function draw() {
  if (dirty) { renderBurst(); dirty = false; }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  renderBurst();
}

// -- Core rendering --
function renderBurst() {
  background(40, 8, 92);

  var panelH = document.getElementById('panel').offsetHeight;
  var visH = height - panelH;
  var cx = width / 2;
  var cy = visH / 2;
  var radius = params.size * min(width, visH);

  noiseSeed(params.seed);
  randomSeed(params.seed);

  var N = params.count;
  var slice = TWO_PI / N;
  var petalHalf = slice * params.width * 0.5;
  var gapHalf = (slice - petalHalf * 2) * 0.5 + petalHalf * 0.15;

  // Per-petal radius variation for irregular silhouette
  var radii = [];
  for (var i = 0; i < N; i++) {
    radii.push(radius * (0.90 + noise(i * 0.7 + params.seed * 0.01) * 0.18));
  }

  push();
  translate(cx, cy);

  // 1. Background wash
  for (var r = radius * 1.15; r > radius * 0.3; r -= 5) {
    var a = map(r, radius * 1.15, radius * 0.3, 2, 6);
    fill(params.hue, 20, 82, a);
    ellipse(0, 0, r * 2, r * 2);
  }

  // 2. Gap fill
  for (var i = 0; i < N; i++) {
    var ca = slice * i + slice * 0.5;
    var gr = (radii[i] + radii[(i + 1) % N]) * 0.5;
    stampWedge(ca, gapHalf, gr, params.gapHue, 0.85, i + 100);
  }

  // 3. Petal strokes
  for (var i = 0; i < N; i++) {
    stampWedge(slice * i, petalHalf, radii[i], params.hue, 1.0, i);
  }

  // 4. Accent strokes (thin bristle tracks)
  for (var i = 0; i < N; i++) {
    stampAccent(slice * i, petalHalf * 0.4, radii[i] * 0.92, params.hue, i + 300);
  }

  // 5. Edge pooling
  for (var i = 0; i < N; i++) {
    var ga = slice * i + slice * 0.5;
    var gr = (radii[i] + radii[(i + 1) % N]) * 0.5;
    stampPooling(ga, gr, params.gapHue, i + 200);
  }

  // 6. Center bloom
  stampCenter(radius * 0.22, params.hue);

  pop();

  // CSS blur
  var cnvEl = document.querySelector('canvas.p5Canvas');
  if (cnvEl) cnvEl.style.filter = 'blur(' + params.blur + 'px)';
}

// -- Stamp a radial wedge --
// Fills a wedge with overlapping semi-transparent circles
// simulating a wide loaded brush dragged outward.
function stampWedge(centerAngle, halfAngle, maxR, hue, intensity, nOff) {
  var rSteps = 35;
  var aSteps = 16;

  for (var ri = 0; ri < rSteps; ri++) {
    var rFrac = ri / rSteps;
    var r = maxR * (0.04 + rFrac * 0.96);
    var wMult = sin(rFrac * PI) * 0.65 + 0.35;
    var cR = maxR * 0.058 * wMult * (0.75 + noise(nOff, ri * 0.25) * 0.65);

    for (var ai = 0; ai < aSteps; ai++) {
      var aFrac = (ai / (aSteps - 1)) * 2 - 1;
      var ang = centerAngle + halfAngle * aFrac * wMult;
      var nA = (noise(nOff * 3, ri * 0.12, ai * 0.18) - 0.5) * halfAngle * 0.45;
      var nR = (noise(nOff * 3 + 50, ri * 0.12, ai * 0.18) - 0.5) * maxR * 0.055;
      var px = cos(ang + nA) * (r + nR);
      var py = sin(ang + nA) * (r + nR);

      var hV = (noise(nOff + 10, ri * 0.18, ai * 0.25) - 0.5) * 22;
      var sV = 65 + noise(nOff + 20, ri * 0.10, ai * 0.12) * 25;
      var bV = 50 + noise(nOff + 30, ri * 0.10, ai * 0.12) * 30;

      var edgeFade = 1 - abs(aFrac) * 0.35;
      var outerFade = rFrac > 0.80 ? map(rFrac, 0.80, 1, 1, 0.25) : 1;
      var innerBoost = rFrac < 0.25 ? map(rFrac, 0, 0.25, 1.3, 1) : 1;
      var alpha = 13 * intensity * edgeFade * outerFade * innerBoost;

      fill((hue + hV + 360) % 360, sV, bV, alpha);
      ellipse(px, py, cR * 2, cR * 2);
    }
  }
}

// -- Accent strokes: thin bristle tracks --
function stampAccent(centerAngle, halfAngle, maxR, hue, nOff) {
  var steps = 22;
  for (var ri = 0; ri < steps; ri++) {
    var rFrac = ri / steps;
    var r = maxR * (0.08 + rFrac * 0.92);
    var cR = maxR * 0.025 * (0.7 + noise(nOff, ri * 0.3) * 0.6);
    for (var li = 0; li < 3; li++) {
      var lOff = (li - 1) * halfAngle * 0.35;
      var nA = (noise(nOff * 2, ri * 0.1, li * 0.5) - 0.5) * halfAngle * 0.3;
      var px = cos(centerAngle + lOff + nA) * r;
      var py = sin(centerAngle + lOff + nA) * r;
      var hV = (noise(nOff + 15, ri * 0.15, li) - 0.5) * 15;
      var oF = rFrac > 0.75 ? map(rFrac, 0.75, 1, 1, 0.2) : 1;
      fill((hue + hV + 5 + 360) % 360, 75, 45, 10 * oF);
      ellipse(px, py, cR * 2, cR * 2);
    }
  }
}

// -- Edge pooling: darker marks where paint collects --
function stampPooling(angle, maxR, hue, nOff) {
  var poolR = maxR * (0.78 + noise(nOff * 2) * 0.18);
  var spread = 0.10 + noise(nOff * 2 + 5) * 0.08;
  for (var i = 0; i < 10; i++) {
    var aO = (noise(nOff, i * 0.4) - 0.5) * spread;
    var rO = (noise(nOff + 30, i * 0.4) - 0.5) * maxR * 0.12;
    var px = cos(angle + aO) * (poolR + rO);
    var py = sin(angle + aO) * (poolR + rO);
    var cr = maxR * (0.035 + noise(nOff + 80, i) * 0.04);
    var dH = (hue + 10 + noise(nOff + 90, i) * 15) % 360;
    fill(dH, 55 + noise(nOff + 95, i) * 20, 30 + noise(nOff + 100, i) * 12, 18);
    ellipse(px, py, cr * 2, cr * 2);
  }
}

// -- Center bloom --
function stampCenter(radius, hue) {
  for (var r = radius * 1.5; r > 0; r -= 2.5) {
    var t = r / (radius * 1.5);
    fill(hue, 50 + (1 - t) * 25, 72 + (1 - t) * 12, 6 + (1 - t) * 6);
    ellipse(0, 0, r * 2, r * 2);
  }
  for (var r = radius * 0.5; r > 0; r -= 2) {
    var t = r / (radius * 0.5);
    fill((hue + 6) % 360, 70 + (1 - t) * 15, 42 + (1 - t) * 12, 8 + (1 - t) * 12);
    ellipse(0, 0, r * 2, r * 2);
  }
}

// -- UI --
function setFill(el) {
  var pct = ((parseFloat(el.value) - parseFloat(el.min)) /
             (parseFloat(el.max) - parseFloat(el.min)) * 100).toFixed(1) + '%';
  el.style.setProperty('--fill', pct);
}

function updatePreviews() {
  document.getElementById('hue-preview').style.background =
    'hsl(' + params.hue + ', 75%, 55%)';
  document.getElementById('gap-preview').style.background =
    'hsl(' + params.gapHue + ', 60%, 55%)';
}

function scheduleRender() { dirty = true; redraw(); }

function initUI() {
  var sliders = [
    { id: 's-count', key: 'count', vid: 'v-count', fmt: function(v){return ''+Math.round(v);}, parse: Math.round },
    { id: 's-width', key: 'width', vid: 'v-width', fmt: function(v){return v.toFixed(2);} },
    { id: 's-size',  key: 'size',  vid: 'v-size',  fmt: function(v){return v.toFixed(2);} },
    { id: 's-hue',   key: 'hue',   vid: 'v-hue',   fmt: function(v){return ''+Math.round(v);}, parse: Math.round },
    { id: 's-gap',   key: 'gapHue',vid: 'v-gap',   fmt: function(v){return ''+Math.round(v);}, parse: Math.round },
    { id: 's-blur',  key: 'blur',  vid: 'v-blur',  fmt: function(v){return ''+v;} }
  ];

  sliders.forEach(function(s) {
    var el = document.getElementById(s.id);
    setFill(el);
    el.addEventListener('input', function() {
      var val = parseFloat(el.value);
      if (s.parse) val = s.parse(val);
      params[s.key] = val;
      document.getElementById(s.vid).textContent = s.fmt(val);
      setFill(el);
      updatePreviews();
      scheduleRender();
    });
  });

  document.getElementById('btn-seed').addEventListener('click', function() {
    params.seed = Math.floor(Math.random() * 99999);
    scheduleRender();
  });

  updatePreviews();
}
</script>
</body>
</html>
