<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flower Power</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #D8D0C0; --panel: #DDD7CB; --border: #BFB8A8;
  --text: #4A4030; --dim: #8A8070; --accent: #3A3020; --track: #C8C0B0;
}
body {
  background-color: #D8D0C0;
  font-family: 'IBM Plex Mono', monospace;
  width: 100vw; height: 100vh; overflow: hidden; color: var(--text);
}
canvas { position: fixed !important; top: 0; left: 0; z-index: 0; }
#reg-marks { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
#reg-marks span {
  position: absolute; width: 14px; height: 14px;
  border: 1px solid #9A8F80; opacity: 0.28; display: block;
}
#reg-marks span:nth-child(1) { top:14px; left:14px; border-right:0; border-bottom:0; }
#reg-marks span:nth-child(2) { top:14px; right:14px; border-left:0; border-bottom:0; }
#reg-marks span:nth-child(3) { bottom:14px; left:14px; border-right:0; border-top:0; }
#reg-marks span:nth-child(4) { bottom:14px; right:14px; border-left:0; border-top:0; }
#spine {
  position: fixed; left: 14px; top: 50%;
  transform: translateY(-50%) rotate(180deg);
  writing-mode: vertical-rl; font-size: 7px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--dim); opacity: 0.45;
  z-index: 5; pointer-events: none;
}
#panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
  background: var(--panel); border-top: 1px solid var(--border);
  display: flex; align-items: flex-end; padding: 14px 28px 16px; gap: 24px;
}
.ctrl-group { display: flex; flex-direction: column; gap: 5px; flex: 1; max-width: 200px; }
.ctrl-label { font-size: 7px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); }
.ctrl-with-val { display: flex; align-items: center; gap: 7px; }
.ctrl-val {
  font-size: 8px; color: var(--text); font-variant-numeric: tabular-nums;
  min-width: 28px; text-align: right; flex-shrink: 0;
}
input[type=range] {
  -webkit-appearance: none; appearance: none; width: 100%; height: 2px;
  background: linear-gradient(to right,
    var(--accent) 0%, var(--accent) var(--fill, 0%),
    var(--track) var(--fill, 0%), var(--track) 100%);
  outline: none; cursor: pointer; border-radius: 0;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 2px; height: 11px;
  background: var(--accent); border-radius: 0; cursor: pointer;
}
input[type=range]::-moz-range-thumb {
  width: 2px; height: 11px; background: var(--accent);
  border-radius: 0; cursor: pointer; border: none;
}
.hue-dot {
  width: 18px; height: 18px; border-radius: 50%;
  border: 1px solid var(--border); flex-shrink: 0;
  align-self: flex-end; margin-bottom: 1px;
}
</style>
</head>
<body>

<div id="reg-marks"><span></span><span></span><span></span><span></span></div>
<div id="spine">watercolor &middot; radial &middot; burst</div>

<div id="panel">
  <div class="ctrl-group">
    <span class="ctrl-label">Petals</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-count" min="5" max="12" step="1" value="8">
      <span class="ctrl-val" id="v-count">8</span>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Width</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-width" min="0.2" max="0.9" step="0.01" value="0.55">
      <span class="ctrl-val" id="v-width">0.55</span>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Softness</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-soft" min="0.05" max="0.5" step="0.01" value="0.18">
      <span class="ctrl-val" id="v-soft">0.18</span>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Hue</span>
    <div class="ctrl-with-val">
      <input type="range" id="s-hue" min="0" max="359" step="1" value="38">
      <span class="ctrl-val" id="v-hue">38</span>
    </div>
  </div>
  <div class="hue-dot" id="hue-preview"></div>
</div>

<script>
// ─────────────────────────────────────────────────────────
// Flower Power v3 — Sun-Exposed Print
//
// Everything computed per-pixel in the fragment shader.
// No shape buffers, no polygon drawing, no blur-as-SDF.
// Petal shapes defined as polar math — naturally smooth,
// infinite resolution, no hard edges to fight.
//
// The aesthetic: faded pigment on old paper, chalky,
// muted, soft — like something left in a window for years.
// ─────────────────────────────────────────────────────────

var vertSrc = `
attribute vec3 aPosition;
attribute vec2 aTexCoord;
uniform mat4 uModelViewMatrix;
uniform mat4 uProjectionMatrix;
varying vec2 vUv;
void main() {
  vUv = aTexCoord;
  gl_Position = uProjectionMatrix * uModelViewMatrix * vec4(aPosition, 1.0);
}
`;

var fragSrc = `
precision highp float;
varying vec2 vUv;
uniform vec2 uResolution;
uniform float uTime;
uniform float uPetals;
uniform float uWidth;
uniform float uSoftness;
uniform vec3 uColor1;  // petal color (muted)
uniform vec3 uColor2;  // gap color (analogous)
uniform vec3 uPaper;   // paper background

// ── Noise ──
float hash(vec2 p) {
  vec3 p3 = fract(vec3(p.xyx) * vec3(0.1031, 0.1030, 0.0973));
  p3 += dot(p3, p3.yzx + 33.33);
  return fract((p3.x + p3.y) * p3.z);
}

float vnoise(vec2 p) {
  vec2 i = floor(p), f = fract(p);
  f = f * f * f * (f * (f * 6.0 - 15.0) + 10.0);
  float a = hash(i), b = hash(i + vec2(1,0));
  float c = hash(i + vec2(0,1)), d = hash(i + vec2(1,1));
  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}

float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  v += vnoise(p)*a; p = p*2.13 + vec2(173.7, 291.2); a *= 0.5;
  v += vnoise(p)*a; p = p*2.07 + vec2(839.3, 428.8); a *= 0.5;
  v += vnoise(p)*a; p = p*2.11 + vec2(531.1, 167.7); a *= 0.5;
  v += vnoise(p)*a;
  return v;
}

void main() {
  // Aspect-corrected coordinates centered at (0,0)
  vec2 uv = vUv;
  vec2 aspect = vec2(uResolution.x / uResolution.y, 1.0);
  vec2 p = (uv - 0.5) * aspect * 2.5; // centered, scaled

  // Polar coordinates
  float r = length(p);
  float a = atan(p.y, p.x);

  // ── Petal shape function ──
  // A radial cosine wave creates the petal pattern.
  // Domain-warped for organic irregularity.
  float N = uPetals;
  float warpA = fbm(vec2(a * 2.0, r * 3.0) + uTime * 0.15) * 0.8;
  float warpR = fbm(vec2(r * 4.0, a * 1.5) + uTime * 0.12 + 500.0) * 0.3;

  // Petal wave: cos(N * angle) gives N petals
  float petalWave = cos(N * (a + warpA)) * 0.5 + 0.5; // 0-1, peaks at petal centers
  // Modulate petal reach by the wave
  float petalReach = 0.6 + petalWave * uWidth * 0.5 + warpR;

  // Distance from petal boundary (positive = inside, negative = outside)
  float dist = petalReach - r;

  // ── Soft falloff — the whole look ──
  // Very wide smoothstep for that faded, out-of-focus print quality.
  // No hard threshold. Everything dissolves into everything.
  float soft = uSoftness;
  float petalMask = smoothstep(-soft, soft * 2.0, dist);
  float gapMask = smoothstep(-soft * 0.5, soft * 1.5, dist);
  // Invert gap: strongest where petals are weakest
  float gapPresence = (1.0 - petalMask) * smoothstep(1.2, 0.3, r);

  // ── Color mixing ──
  // Start with paper
  vec3 color = uPaper;

  // Per-petal hue variation via noise
  float hueVar = fbm(vec2(a * 3.0, uTime * 0.1) + 200.0);
  float hueShift = (hueVar - 0.5) * 0.12; // subtle, within-family

  // Gap color: laid down first, faded
  vec3 gapCol = uColor2 * (0.85 + fbm(vec2(a*2.0, r*5.0) + 700.0) * 0.3);
  color = mix(color, gapCol, gapPresence * 0.55);

  // Petal color: on top, with gradient from bright center to muted edge
  float radialGrad = smoothstep(0.0, petalReach * 0.8, r);
  vec3 petalCol = uColor1;
  // Center is warmer/brighter, edges are cooler/muted
  petalCol = mix(petalCol * 1.15, petalCol * 0.7, radialGrad);
  // Add the subtle hue variation
  petalCol = mix(petalCol, petalCol.gbr, hueShift);
  color = mix(color, petalCol, petalMask * 0.8);

  // ── Dark pooling at intersections ──
  // Where gap and petal overlap strongly, pigment concentrates
  float pooling = petalMask * gapPresence;
  color *= 1.0 - pooling * 0.35;

  // ── Paper texture ──
  // Very subtle, like aged paper fiber
  float paper = fbm(uv * 30.0 + 1000.0);
  color *= 0.97 + paper * 0.06;

  // ── Fade to paper at edges (vignette-like) ──
  float outerFade = smoothstep(1.3, 0.5, r);
  color = mix(uPaper, color, outerFade);

  // ── Sun-exposed desaturation ──
  // Push everything slightly toward the paper tone, as if faded by light
  float lum = dot(color, vec3(0.299, 0.587, 0.114));
  vec3 faded = mix(vec3(lum), color, 0.75); // 25% desaturated
  color = mix(faded, color, smoothstep(0.8, 0.2, r)); // more saturated at center

  gl_FragColor = vec4(color, 1.0);
}
`;

var params = {
  count: 8, width: 0.55, softness: 0.18, hue: 38
};

var flowerShader;

function setup() {
  var cnv = createCanvas(windowWidth, windowHeight, WEBGL);
  cnv.style('position', 'fixed');
  cnv.style('top', '0');
  cnv.style('left', '0');
  cnv.style('z-index', '0');
  pixelDensity(1);
  flowerShader = createShader(vertSrc, fragSrc);
  initUI();
  renderFlower();
}

function draw() {}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  renderFlower();
}

function hsbToRgb(h, s, b) {
  h = ((h % 360) + 360) % 360;
  s /= 100; b /= 100;
  var c = b * s, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = b - c;
  var r, g, bl;
  if (h < 60) { r=c; g=x; bl=0; }
  else if (h < 120) { r=x; g=c; bl=0; }
  else if (h < 180) { r=0; g=c; bl=x; }
  else if (h < 240) { r=0; g=x; bl=c; }
  else if (h < 300) { r=x; g=0; bl=c; }
  else { r=c; g=0; bl=x; }
  return [r+m, g+m, bl+m];
}

function renderFlower() {
  // Muted, chalky colors — not vivid
  var col1 = hsbToRgb(params.hue, 55, 70);
  var col2 = hsbToRgb((params.hue + 55) % 360, 40, 60);

  shader(flowerShader);
  flowerShader.setUniform('uResolution', [width, height]);
  flowerShader.setUniform('uTime', millis() / 1000.0);
  flowerShader.setUniform('uPetals', params.count);
  flowerShader.setUniform('uWidth', params.width);
  flowerShader.setUniform('uSoftness', params.softness);
  flowerShader.setUniform('uColor1', col1);
  flowerShader.setUniform('uColor2', col2);
  flowerShader.setUniform('uPaper', [0.847, 0.816, 0.753]);
  noStroke();
  plane(width, height);
}

// ── UI ──
function setFill(el) {
  var pct = ((parseFloat(el.value) - parseFloat(el.min)) /
             (parseFloat(el.max) - parseFloat(el.min)) * 100).toFixed(1) + '%';
  el.style.setProperty('--fill', pct);
}

var renderRAF = null;
function scheduleRender() {
  if (renderRAF) return;
  renderRAF = requestAnimationFrame(function() {
    renderFlower();
    renderRAF = null;
  });
}

function initUI() {
  var sliders = [
    { id: 's-count', key: 'count', vid: 'v-count', fmt: function(v){return ''+Math.round(v);}, parse: Math.round },
    { id: 's-width', key: 'width', vid: 'v-width', fmt: function(v){return v.toFixed(2);} },
    { id: 's-soft',  key: 'softness', vid: 'v-soft', fmt: function(v){return v.toFixed(2);} },
    { id: 's-hue',   key: 'hue',  vid: 'v-hue',  fmt: function(v){return ''+Math.round(v);}, parse: Math.round }
  ];

  sliders.forEach(function(s) {
    var el = document.getElementById(s.id);
    setFill(el);
    el.addEventListener('input', function() {
      var val = parseFloat(el.value);
      if (s.parse) val = s.parse(val);
      params[s.key] = val;
      document.getElementById(s.vid).textContent = s.fmt(val);
      setFill(el);
      document.getElementById('hue-preview').style.background =
        'hsl(' + params.hue + ', 55%, 65%)';
      scheduleRender();
    });
  });

  document.getElementById('hue-preview').style.background =
    'hsl(' + params.hue + ', 55%, 65%)';

  // Continuous slow morph
  function tick() {
    requestAnimationFrame(tick);
    scheduleRender();
  }
  tick();
}
</script>
</body>
</html>
