<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flower Power</title>
<style>
* { margin: 0; padding: 0; }
body { background: #D4CCB8; width: 100vw; height: 100vh; overflow: hidden; }
canvas { position: fixed; top: 0; left: 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ─────────────────────────────────────────────────────────
// Flower Power v6 — Canvas 2D Radial Gradient Blobs
//
// Each petal is a separate soft gradient ellipse.
// Each one is its own independent painted mark.
// Multiply blending creates dark olive overlaps naturally.
// No shader, no polar math, no artifacts.
// ─────────────────────────────────────────────────────────

var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');

// Seeded pseudo-random for repeatable results
var seed = 12345;
function rand() {
  seed = (seed * 16807 + 0) % 2147483647;
  return (seed - 1) / 2147483646;
}

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  paint();
}

function paint() {
  var W = canvas.width;
  var H = canvas.height;
  var cx = W / 2;
  var cy = H / 2;
  var baseR = Math.min(W, H) * 0.28; // base petal reach

  // Reset seed for consistent output
  seed = 12345;

  // ── Background ──
  ctx.fillStyle = '#D4CCB8';
  ctx.fillRect(0, 0, W, H);

  var N = 8; // petals per color

  // ── Generate petal properties ──
  var petals = [];
  for (var i = 0; i < N; i++) {
    var angle = (i / N) * Math.PI * 2;
    petals.push({
      angle: angle + (rand() - 0.5) * 0.15,    // slight angle drift
      length: baseR * (0.80 + rand() * 0.40),   // 80-120% of base
      width: baseR * (0.30 + rand() * 0.25),     // width perpendicular to axis
      offset: baseR * (0.05 + rand() * 0.10),    // how far from center the blob starts
    });
  }

  var gaps = [];
  for (var i = 0; i < N; i++) {
    var angle = (i / N) * Math.PI * 2 + Math.PI / N; // offset half-step
    gaps.push({
      angle: angle + (rand() - 0.5) * 0.12,
      length: baseR * (0.65 + rand() * 0.35),
      width: baseR * (0.25 + rand() * 0.20),
      offset: baseR * (0.05 + rand() * 0.08),
    });
  }

  // ── Draw function: soft gradient ellipse ──
  function drawBlob(blob, color, alpha) {
    var len = blob.length;
    var wid = blob.width;
    var ang = blob.angle;
    // Blob center is offset from flower center along its angle
    var blobCx = cx + Math.cos(ang) * (blob.offset + len * 0.35);
    var blobCy = cy + Math.sin(ang) * (blob.offset + len * 0.35);

    ctx.save();
    ctx.translate(blobCx, blobCy);
    ctx.rotate(ang);
    // Scale to create ellipse from circle
    ctx.scale(1, wid / len);

    var grad = ctx.createRadialGradient(0, 0, 0, 0, 0, len * 0.65);
    grad.addColorStop(0, color.replace(')', ',' + alpha + ')').replace('rgb', 'rgba'));
    grad.addColorStop(0.5, color.replace(')', ',' + (alpha * 0.7) + ')').replace('rgb', 'rgba'));
    grad.addColorStop(1, color.replace(')', ',0)').replace('rgb', 'rgba'));

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, len * 0.65, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // ── Layer 1: Plum fringe (very faint, large) ──
  ctx.globalCompositeOperation = 'source-over';
  for (var i = 0; i < N; i++) {
    var ang = (i / N) * Math.PI * 2 + (rand() - 0.5) * 0.3;
    var fringeBlob = {
      angle: ang,
      length: baseR * 1.15,
      width: baseR * 0.55,
      offset: baseR * 0.1,
    };
    drawBlob(fringeBlob, 'rgb(164,125,150)', 0.12);
  }

  // ── Layer 2: Blue gap fills (multiply) ──
  ctx.globalCompositeOperation = 'multiply';
  // Multiple passes for richness
  for (var pass = 0; pass < 3; pass++) {
    for (var i = 0; i < N; i++) {
      var g = gaps[i];
      // Slight jitter per pass
      var jitteredBlob = {
        angle: g.angle + (rand() - 0.5) * 0.04,
        length: g.length * (0.92 + rand() * 0.16),
        width: g.width * (0.90 + rand() * 0.20),
        offset: g.offset + (rand() - 0.5) * baseR * 0.03,
      };
      drawBlob(jitteredBlob, 'rgb(157,180,209)', 0.40);
    }
  }

  // ── Layer 3: Orange petals (multiply) ──
  for (var pass = 0; pass < 3; pass++) {
    for (var i = 0; i < N; i++) {
      var p = petals[i];
      var jitteredBlob = {
        angle: p.angle + (rand() - 0.5) * 0.04,
        length: p.length * (0.92 + rand() * 0.16),
        width: p.width * (0.90 + rand() * 0.20),
        offset: p.offset + (rand() - 0.5) * baseR * 0.03,
      };
      drawBlob(jitteredBlob, 'rgb(250,123,2)', 0.45);
    }
  }

  // ── Layer 4: Center glow (normal blend, on top) ──
  ctx.globalCompositeOperation = 'source-over';
  var centerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, baseR * 0.35);
  centerGrad.addColorStop(0, 'rgba(237,215,96,0.65)');
  centerGrad.addColorStop(0.5, 'rgba(237,215,96,0.25)');
  centerGrad.addColorStop(1, 'rgba(237,215,96,0)');
  ctx.fillStyle = centerGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, baseR * 0.35, 0, Math.PI * 2);
  ctx.fill();

  ctx.globalCompositeOperation = 'source-over';
}

window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
